<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sélection Boss Battle</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: sans-serif;
            background-color: #0a0000;
            color: #fff;
            margin: 0;
            padding: 20px;
            /* C'est ce bloc qui centre tout au milieu de l'écran */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
        }

        h1 {
            color: #ff4444;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        .btn-hero {
            background: #1a0505;
            border: 2px solid #ff4444;
            color: white;
            padding: 15px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            text-align: center;
        }

        .btn-hero:hover {
            background: #ff4444;
            color: black;
            box-shadow: 0 0 15px #ff4444;
        }

        .btn-home {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-home:hover {
            background: #555;
        }
        
        /* Ajustement pour les très petits écrans (mobiles étroits) */
        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Choisis ton héros pour le Mode Boss</h1>

    <div class="grid">
        <button class="btn-hero" onclick="selectHero('House of Laura')">House of Laura</button>
        <button class="btn-hero" onclick="selectHero('HOL Rozuya')">HOL Rozuya</button>
        <button class="btn-hero" onclick="selectHero('HOL Tony')">HOL Tony</button>
        <button class="btn-hero" onclick="selectHero('HOL Omass')">HOL Omass</button>
        <button class="btn-hero" onclick="selectHero('K974YT')">K974YT</button>
        <button class="btn-hero" onclick="selectHero('Dark MortelCygne')">Dark MortelCygne</button>
    </div>

    <button class="btn-home" onclick="location.href='index.html'">Retour à l'accueil</button>

    <script>
        function selectHero(heroName) {
            // Sauvegarde le choix du joueur et lance le combat
            localStorage.setItem('bossChar', heroName);
            window.location.href = 'boss_jeu.html';
        }
    </script>
</body>
</html>
