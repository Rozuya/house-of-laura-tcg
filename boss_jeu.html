<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boss Battle</title>
    <style>
        body { font-family: sans-serif; background: #0a0000; color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background: #1a0505; padding: 20px; border-radius: 15px; border: 2px solid #ff4444; }
        .bar-bg { height: 20px; background: #333; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        .p-bar { height: 100%; background: #9146ff; width: 100%; transition: width 0.3s; }
        .b-bar { height: 100%; background: linear-gradient(90deg, #ff0000, #ffaa00); width: 100%; transition: width 0.3s; }
        .btn { padding: 12px; background: #220000; border: 1px solid #ff4444; color: white; cursor: pointer; border-radius: 8px; font-size: 0.9rem; }
        .btn:disabled { opacity: 0.4; }
        #log-text { height: 60px; color: #ffaa00; font-style: italic; margin: 15px 0; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.95rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-btn { padding: 15px 30px; background: #ffaa00; color: black; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div id="endModal" class="modal"><div class="container" style="text-align:center"><h1 id="modal-title"></h1><p id="modal-desc"></p><div id="modal-buttons"></div></div></div>
    
    <div style="font-weight:bold; color:#ffaa00; margin-bottom:10px" id="level-display"></div>
    <div class="container">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <div style="flex:1"><div id="p-name"></div><div class="bar-bg"><div id="p-bar" class="p-bar"></div></div></div>
            <div style="flex:1"><div id="e-name"></div><div class="bar-bg"><div id="e-bar" class="b-bar"></div></div></div>
        </div>
        <div id="log-text">Le combat commence !</div>
        <div id="actions" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
    </div>

    <script>
        const playerChars = {
            "House of Laura": {hp: 220, skills: [{n:'Chat Spam',v:25,t:'dmg',cd:0}, {n:'BRB',v:40,t:'heal',cd:2}, {n:'Host Raid',v:45,t:'dmg',cd:1}, {n:'Donation',v:60,t:'dmg',cd:2}, {n:'Stream Event',v:90,t:'dmg',cd:3}, {n:'Partner Prime',v:125,t:'dmg',cd:5}]},
            "HOL Rozuya": {hp: 215, skills: [{n:'Code',v:25,t:'dmg',cd:0}, {n:'Soin',v:45,t:'heal',cd:2}, {n:'Debug',v:40,t:'dmg',cd:1}, {n:'Panic',v:55,t:'dmg',cd:2}, {n:'Backup',v:70,t:'heal',cd:4}, {n:'System',v:115,t:'dmg',cd:5}]},
            "HOL Tony": {hp: 260, skills: [{n:'Bloc',v:22,t:'dmg',cd:0}, {n:'Soin',v:40,t:'heal',cd:2}, {n:'Cri',v:35,t:'dmg',cd:1}, {n:'Rush',v:45,t:'dmg',cd:2}, {n:'Impact',v:75,t:'dmg',cd:4}, {n:'Mur',v:90,t:'dmg',cd:5}]},
            "HOL Omass": {hp: 200, skills: [{n:'Rush',v:30,t:'dmg',cd:0}, {n:'Flex',v:35,t:'heal',cd:2}, {n:'Punch',v:45,t:'dmg',cd:1}, {n:'Slam',v:60,t:'dmg',cd:2}, {n:'Fury',v:130,t:'dmg',cd:5}]},
            "K974YT": {hp: 190, skills: [{n:'Jump',v:35,t:'dmg',cd:0}, {n:'Cut',v:35,t:'heal',cd:2}, {n:'Dash',v:45,t:'dmg',cd:1}, {n:'Slash',v:80,t:'dmg',cd:3}, {n:'Blade',v:100,t:'dmg',cd:4}, {n:'Backstab',v:140,t:'dmg',cd:5}]},
            "Dark MortelCygne": {hp: 210, skills: [{n:'Ombre',v:25,t:'dmg',cd:0}, {n:'Vampire',v:40,t:'heal',cd:2}, {n:'Griffe',v:45,t:'dmg',cd:1}, {n:'Black',v:70,t:'dmg',cd:2}, {n:'Soul',v:115,t:'dmg',cd:5}]}
        };

        const bosses = [
            {n: "Le Noob", hp: 180, s: [{n:'Coup',v:20,t:'dmg',cd:0}, {n:'Potion',v:30,t:'heal',cd:3}]},
            {n: "Troll du Chat", hp: 200, s: [{n:'Spam',v:25,t:'dmg',cd:0}, {n:'Rage',v:40,t:'dmg',cd:2}]},
            {n: "Hater Anonyme", hp: 230, s: [{n:'Insulte',v:30,t:'dmg',cd:0}, {n:'Mauvaise Foi',v:45,t:'heal',cd:3}]},
            {n: "Bot Auto", hp: 260, s: [{n:'Laser',v:35,t:'dmg',cd:0}, {n:'Surcharge',v:55,t:'dmg',cd:2}]},
            {n: "Modérateur", hp: 300, s: [{n:'Avertissement',v:30,t:'dmg',cd:0}, {n:'Ban',v:70,t:'dmg',cd:3}, {n:'Mute',v:50,t:'heal',cd:4}]},
            {n: "Le Sniper", hp: 320, s: [{n:'Tir',v:40,t:'dmg',cd:0}, {n:'Headshot',v:90,t:'dmg',cd:4}]},
            {n: "Démon Lag", hp: 350, s: [{n:'Freeze',v:35,t:'dmg',cd:0}, {n:'Rollback',v:80,t:'heal',cd:4}, {n:'Kick',v:100,t:'dmg',cd:5}]},
            {n: "Faux Viewer", hp: 380, s: [{n:'Frappe',v:45,t:'dmg',cd:0}, {n:'Absorb',v:60,t:'heal',cd:3}]},
            {n: "Copyright", hp: 420, s: [{n:'Censure',v:50,t:'dmg',cd:0}, {n:'Plainte',v:75,t:'dmg',cd:2}, {n:'Strike',v:110,t:'dmg',cd:4}]},
            {n: "Hacker", hp: 460, s: [{n:'Virus',v:45,t:'dmg',cd:0}, {n:'Vol',v:60,t:'heal',cd:2}, {n:'DDoS',v:120,t:'dmg',cd:5}]},
            {n: "Anti-Héros", hp: 500, s: [{n:'Coup',v:55,t:'dmg',cd:0}, {n:'Trahison',v:85,t:'dmg',cd:2}, {n:'Régén',v:100,t:'heal',cd:5}]},
            {n: "Ombre Laura", hp: 550, s: [{n:'Ombre',v:60,t:'dmg',cd:0}, {n:'Raid',v:90,t:'dmg',cd:2}, {n:'Drain',v:120,t:'heal',cd:4}]},
            {n: "Final (Faux)", hp: 600, s: [{n:'Fatal',v:65,t:'dmg',cd:0}, {n:'Illusion',v:110,t:'dmg',cd:3}, {n:'Absolu',v:150,t:'heal',cd:5}]},
            {n: "Cauchemar", hp: 680, s: [{n:'Terreur',v:70,t:'dmg',cd:0}, {n:'Glitch',v:130,t:'dmg',cd:3}]},
            {n: "L'ALGORITHME", hp: 800, s: [{n:'Code',v:80,t:'dmg',cd:0}, {n:'Banni',v:150,t:'dmg',cd:3}, {n:'Resto',v:200,t:'heal',cd:5}, {n:'OBLI',v:250,t:'dmg',cd:7}]}
        ];

        let currentLevel = parseInt(localStorage.getItem('bossLevel')) || 1;
        let pName = localStorage.getItem('bossChar') || "House of Laura";
        let multiplier = 1 + ((currentLevel - 1) * 0.15);
        let pS = playerChars[pName].skills.map(s => ({...s, v: Math.round(s.v * (s.t === 'dmg' ? multiplier : 1.1)), cdActuel: 0}));
        let pMaxHP = Math.round(playerChars[pName].hp * (1 + (currentLevel - 1) * 0.2)), pHP = pMaxHP;
        let bD = bosses[currentLevel-1], eName = bD.n, eMaxHP = bD.hp, eHP = eMaxHP, eS = bD.s.map(s => ({...s, cdActuel: 0}));
        let isPlayerTurn = true, actionEnCours = false;

        function updateUI() {
            document.getElementById('level-display').innerText = `NIVEAU ${currentLevel} / 15`;
            document.getElementById('p-name').innerText = pName + " (" + pHP + ")";
            document.getElementById('e-name').innerText = eName + " (" + eHP + ")";
            document.getElementById('p-bar').style.width = (pHP/pMaxHP*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/eMaxHP*100) + "%";
            const cont = document.getElementById('actions'); cont.innerHTML = '';
            pS.forEach((s) => {
                let b = document.createElement('button'); b.className = 'btn'; b.disabled = !isPlayerTurn || s.cdActuel > 0;
                b.innerHTML = `<strong>${s.n}</strong><br>${s.cdActuel>0 ? 'CD:'+s.cdActuel : 'PRÊT'}`;
                b.onclick = () => {
                    actionEnCours = true;
                    if(s.t==='dmg') { eHP -= s.v; document.getElementById('log-text').innerText = `${pName} utilise ${s.n} (${s.v} dégâts) !`; }
                    else { pHP = Math.min(pMaxHP, pHP + s.v); document.getElementById('log-text').innerText = `${pName} utilise ${s.n} (soin ${s.v}) !`; }
                    s.cdActuel = s.cd + 1; isPlayerTurn = false;
                    setTimeout(() => { if(eHP <= 0) endGame(true); else aiTurn(); }, 1200);
                };
                cont.appendChild(b);
            });
        }

        function aiTurn() {
            let moves = eS.filter(s => s.cdActuel === 0);
            // IA INTELLIGENTE :
            // Niveaux 1-5 : Aléatoire. Niveaux 6-10 : Priorise les gros dégâts. Niveaux 11-15 : Soin si PV < 50% + priorité OBLI/gros sorts.
            let move;
            if (currentLevel >= 11 && eHP < eMaxHP * 0.5 && moves.find(s => s.t === 'heal')) {
                move = moves.find(s => s.t === 'heal');
            } else {
                move = moves.sort((a,b) => b.v - a.v)[0];
            }
            
            if(move.t === 'dmg') { pHP -= move.v; document.getElementById('log-text').innerText = `${eName} utilise ${move.n} (${move.v} dégâts) !`; }
            else { eHP = Math.min(eMaxHP, eHP + move.v); document.getElementById('log-text').innerText = `${eName} se soigne (${move.v} PV) !`; }
            
            move.cdActuel = move.cd + 1;
            pS.forEach(s => { if(s.cdActuel > 0) s.cdActuel--; });
            eS.forEach(s => { if(s.cdActuel > 0) s.cdActuel--; });
            isPlayerTurn = true; actionEnCours = false;
            if(pHP <= 0) endGame(false); else updateUI();
        }

        function endGame(win) {
            document.getElementById('endModal').style.display = 'flex';
            document.getElementById('modal-title').innerText = win ? "VICTOIRE !" : "DÉFAITE...";
            // ... (logique des boutons déjà définie) ...
            if(win && currentLevel < 15) {
                let n = document.createElement('button'); n.className='modal-btn'; n.innerText="Niveau Suivant";
                n.onclick = () => { localStorage.setItem('bossLevel', currentLevel+1); location.reload(); };
                document.getElementById('modal-buttons').appendChild(n);
            } else { 
                localStorage.setItem('bossLevel', 1);
                let r = document.createElement('button'); r.className='modal-btn'; r.innerText="Recommencer";
                r.onclick = () => location.reload(); document.getElementById('modal-buttons').appendChild(r);
            }
        }
        updateUI();
    </script>
</body>
</html>
