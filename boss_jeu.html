<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mode Boss Battle</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #0a0000; color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; }
        .level-title { color: #ffaa00; font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; text-shadow: 0 0 10px #ff0000; }
        .container { width: 100%; max-width: 600px; background: #1a0505; padding: 25px; border-radius: 15px; border: 2px solid #ff4444; position: relative; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        .status-area { display: flex; gap: 20px; margin-bottom: 25px; }
        .player-status { flex: 1; text-align: center; font-weight: bold; }
        .boss-name { color: #ff4444; font-size: 1.2rem; }
        .bar-bg { height: 20px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #555; margin: 5px 0; }
        .p-bar { height: 100%; background: #9146ff; width: 100%; transition: width 0.3s; }
        .b-bar { height: 100%; background: linear-gradient(90deg, #ff0000, #ffaa00); width: 100%; transition: width 0.3s; }
        #actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn { padding: 15px; background: #220000; border: 1px solid #ff4444; color: white; cursor: pointer; border-radius: 10px; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; }
        .save-btn { width: 100%; padding: 10px; background: #ffaa00; color: black; font-weight: bold; border: none; border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-btn { padding: 15px 30px; background: #ffaa00; color: black; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div id="endModal" class="modal">
        <div class="container" style="text-align:center">
            <h1 id="modal-title" style="color: #ffaa00;">RÉSULTAT</h1>
            <p id="modal-desc"></p>
            <div id="modal-buttons" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>
        </div>
    </div>
    
    <div class="level-title" id="level-display">NIVEAU ? / 15</div>

    <div class="container">
        <button class="save-btn" onclick="sauvegarderPartie()">💾 SAUVEGARDER LA PROGRESSION</button>
        <div class="status-area">
            <div class="player-status"><div id="p-name"></div><div class="bar-bg"><div id="p-bar" class="p-bar"></div></div><div id="p-hp"></div></div>
            <div class="player-status"><div id="e-name" class="boss-name"></div><div class="bar-bg"><div id="e-bar" class="b-bar"></div></div><div id="e-hp"></div></div>
        </div>
        <h2 id="turn-text" style="text-align:center">Le Boss t'attend...</h2>
        <div id="actions"></div>
    </div>

    <script>
        const playerChars = {
            "House of Laura": {hp: 220, skills: [{n:'Chat Spam',v:25,t:'dmg',cd:0}, {n:'BRB',v:40,t:'heal',cd:2}, {n:'Sub Gift',v:50,t:'heal',cd:3}, {n:'Host Raid',v:45,t:'dmg',cd:1}, {n:'Donation',v:60,t:'dmg',cd:2}, {n:'Stream Event',v:90,t:'dmg',cd:3}, {n:'Partner Prime',v:125,t:'dmg',cd:5}]},
            "HOL Rozuya": {hp: 215, skills: [{n:'Code',v:25,t:'dmg',cd:0}, {n:'Soin',v:45,t:'heal',cd:2}, {n:'Debug',v:40,t:'dmg',cd:1}, {n:'Panic',v:55,t:'dmg',cd:2}, {n:'Backup',v:70,t:'heal',cd:4}, {n:'Flash',v:80,t:'dmg',cd:3}, {n:'System',v:115,t:'dmg',cd:5}]},
            "HOL Tony": {hp: 260, skills: [{n:'Bloc',v:22,t:'dmg',cd:0}, {n:'Soin',v:40,t:'heal',cd:2}, {n:'Cri',v:35,t:'dmg',cd:1}, {n:'Rush',v:45,t:'dmg',cd:2}, {n:'Charge',v:60,t:'dmg',cd:3}, {n:'Impact',v:75,t:'dmg',cd:4}, {n:'Mur',v:90,t:'dmg',cd:5}]},
            "HOL Omass": {hp: 200, skills: [{n:'Rush',v:30,t:'dmg',cd:0}, {n:'Flex',v:35,t:'heal',cd:2}, {n:'Punch',v:45,t:'dmg',cd:1}, {n:'Slam',v:60,t:'dmg',cd:2}, {n:'Combo',v:75,t:'dmg',cd:3}, {n:'Uppercut',v:95,t:'dmg',cd:4}, {n:'Fury',v:130,t:'dmg',cd:5}]},
            "K974YT": {hp: 190, skills: [{n:'Jump',v:35,t:'dmg',cd:0}, {n:'Cut',v:35,t:'heal',cd:2}, {n:'Dash',v:45,t:'dmg',cd:1}, {n:'Silent',v:65,t:'dmg',cd:2}, {n:'Slash',v:80,t:'dmg',cd:3}, {n:'Blade',v:100,t:'dmg',cd:4}, {n:'Backstab',v:140,t:'dmg',cd:5}]},
            "Dark MortelCygne": {hp: 210, skills: [{n:'Ombre',v:25,t:'dmg',cd:0}, {n:'Vampire',v:40,t:'heal',cd:2}, {n:'Griffe',v:45,t:'dmg',cd:1}, {n:'Night',v:55,t:'dmg',cd:2}, {n:'Black',v:70,t:'dmg',cd:2}, {n:'Étreinte',v:85,t:'dmg',cd:3}, {n:'Soul',v:115,t:'dmg',cd:5}]}
        };

        const bosses = [
            {n: "Le Noob", hp: 180, s: [{n:'Coup Basique',v:20,t:'dmg',cd:0}, {n:'Potion',v:30,t:'heal',cd:3}]},
            {n: "Troll du Chat", hp: 200, s: [{n:'Spam',v:25,t:'dmg',cd:0}, {n:'Rage',v:40,t:'dmg',cd:2}]},
            {n: "Hater Anonyme", hp: 230, s: [{n:'Insulte',v:30,t:'dmg',cd:0}, {n:'Mauvaise Foi',v:45,t:'heal',cd:3}]},
            {n: "Bot Automatique", hp: 260, s: [{n:'Laser',v:35,t:'dmg',cd:0}, {n:'Surcharge',v:55,t:'dmg',cd:2}]},
            {n: "Modérateur Zélé", hp: 300, s: [{n:'Avertissement',v:30,t:'dmg',cd:0}, {n:'Ban Tempo',v:70,t:'dmg',cd:3}, {n:'Soin Mute',v:50,t:'heal',cd:4}]},
            {n: "Le Sniper", hp: 320, s: [{n:'Tir Rapide',v:40,t:'dmg',cd:0}, {n:'Headshot',v:90,t:'dmg',cd:4}]},
            {n: "Démon du Lag", hp: 350, s: [{n:'Freeze',v:35,t:'dmg',cd:0}, {n:'Rollback',v:80,t:'heal',cd:4}, {n:'Déconnexion',v:100,t:'dmg',cd:5}]},
            {n: "Faux Viewer", hp: 380, s: [{n:'Frappe',v:45,t:'dmg',cd:0}, {n:'Absorption',v:60,t:'heal',cd:3}]},
            {n: "Strike Copyright", hp: 420, s: [{n:'Censure',v:50,t:'dmg',cd:0}, {n:'Plainte',v:75,t:'dmg',cd:2}, {n:'Suppression',v:110,t:'dmg',cd:4}]},
            {n: "Hacker Sombre", hp: 460, s: [{n:'Virus',v:45,t:'dmg',cd:0}, {n:'Vol Données',v:60,t:'heal',cd:2}, {n:'DDoS',v:120,t:'dmg',cd:5}]},
            {n: "Anti-Héros", hp: 500, s: [{n:'Coup Vicieux',v:55,t:'dmg',cd:0}, {n:'Trahison',v:85,t:'dmg',cd:2}, {n:'Régén',v:100,t:'heal',cd:5}]},
            {n: "Ombre de Laura", hp: 550, s: [{n:'Frappe Sombre',v:60,t:'dmg',cd:0}, {n:'Raid Noir',v:90,t:'dmg',cd:2}, {n:'Drain',v:120,t:'heal',cd:4}]},
            {n: "Boss Final (Faux)", hp: 600, s: [{n:'Coup Fatal',v:65,t:'dmg',cd:0}, {n:'Illusion',v:110,t:'dmg',cd:3}, {n:'Soin Absolu',v:150,t:'heal',cd:5}]},
            {n: "Cauchemar Virtuel", hp: 680, s: [{n:'Terreur',v:70,t:'dmg',cd:0}, {n:'Glitch Fatal',v:130,t:'dmg',cd:3}]},
            {n: "L'ALGORITHME", hp: 800, s: [{n:'Code Mortel',v:80,t:'dmg',cd:0}, {n:'Ombre Bannie',v:150,t:'dmg',cd:3}, {n:'Resto',v:200,t:'heal',cd:5}, {n:'OBLI',v:250,t:'dmg',cd:7}]}
        ];

        let currentLevel = parseInt(localStorage.getItem('bossLevel')) || 1;
        let pName = localStorage.getItem('bossChar') || "House of Laura";
        let pS = playerChars[pName].skills.map(s => ({...s, cdActuel: 0}));
        let pMaxHP = playerChars[pName].hp;
        let pHP = pMaxHP;
        let bossData = bosses[currentLevel - 1];
        let eName = bossData.n;
        let eMaxHP = bossData.hp;
        let eHP = eMaxHP;
        let eS = bossData.s.map(s => ({...s, cdActuel: 0}));
        let isPlayerTurn = true, actionEnCours = false;

        function sauvegarderPartie() {
            localStorage.setItem('bossLevel', currentLevel);
            alert("Partie sauvegardée au niveau " + currentLevel + " !");
        }

        window.onbeforeunload = () => "Attention, sauvegarde ta partie avant de quitter !";

        function updateUI() {
            document.getElementById('level-display').innerText = `🔥 NIVEAU ${currentLevel} / 15 🔥`;
            document.getElementById('p-name').innerText = pName;
            document.getElementById('e-name').innerText = `☠️ ${eName}`;
            document.getElementById('p-hp').innerText = `${Math.max(0, pHP)} / ${pMaxHP}`;
            document.getElementById('e-hp').innerText = `${Math.max(0, eHP)} / ${eMaxHP}`;
            document.getElementById('p-bar').style.width = (Math.max(0, pHP)/pMaxHP*100) + "%";
            document.getElementById('e-bar').style.width = (Math.max(0, eHP)/eMaxHP*100) + "%";
            
            const container = document.getElementById('actions');
            container.innerHTML = '';
            pS.forEach((s) => {
                let b = document.createElement('button');
                b.className = 'btn';
                let estPret = (s.cdActuel === 0);
                b.disabled = !isPlayerTurn || actionEnCours || !estPret;
                b.innerHTML = `<strong>${s.n}</strong><br>${s.v} ${s.t}<br>
                               <span style="color: ${estPret ? '#00ff00' : '#ff4444'}; font-weight: bold;">
                                   ${estPret ? 'PRÊT' : 'CD : ' + s.cdActuel}</span>`;
                b.onclick = () => {
                    actionEnCours = true;
                    if(s.t==='dmg') eHP -= s.v; else pHP = Math.min(pMaxHP, pHP + s.v);
                    s.cdActuel = s.cd + 1;
                    isPlayerTurn = false;
                    setTimeout(() => { updateUI(); if(eHP <= 0) endGame(true); else aiTurn(); }, 1000);
                };
                container.appendChild(b);
            });
        }

        function aiTurn() {
            let moves = eS.filter(s => s.cdActuel === 0);
            let heal = moves.find(s => s.t === 'heal');
            let move = (eHP < (eMaxHP * 0.4) && heal) ? heal : moves.sort((a,b) => b.v - a.v)[0];
            if(move.t === 'dmg') pHP -= move.v; else eHP = Math.min(eMaxHP, eHP + move.v);
            move.cdActuel = move.cd + 1;
            pS.forEach(s => { if(s.cdActuel > 0) s.cdActuel--; });
            eS.forEach(s => { if(s.cdActuel > 0) s.cdActuel--; });
            isPlayerTurn = true; actionEnCours = false; updateUI();
            if(pHP <= 0) endGame(false);
        }

        function endGame(win) {
            document.getElementById('endModal').style.display = 'flex';
            document.getElementById('modal-title').innerText = win ? "VICTOIRE !" : "DÉFAITE...";
            let btnContainer = document.getElementById('modal-buttons');
            if(win && currentLevel < 15) {
                let next = document.createElement('button');
                next.className = 'modal-btn'; next.innerText = "Niveau Suivant";
                next.onclick = () => { localStorage.setItem('bossLevel', currentLevel + 1); location.reload(); };
                btnContainer.appendChild(next);
            } else {
                localStorage.setItem('bossLevel', 1);
                let retry = document.createElement('button');
                retry.className = 'modal-btn'; retry.innerText = "Recommencer";
                retry.onclick = () => location.reload();
                btnContainer.appendChild(retry);
            }
        }
        updateUI();
    </script>
</body>
</html>
