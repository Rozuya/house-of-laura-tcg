<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL BATTLE GAME</title>
    <!-- Le lien vers ton fichier style.css est ici -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>HOL BATTLE GAME</h1>
        
        <!-- Boutons d'action -->
        <button class="btn" onclick="location.href='difficulte.html'">Jouer</button>
        <button class="btn" onclick="openRules()">Règles & Actus</button>
    </div>

    <!-- Fenêtre Pop-up pour les règles -->
    <div id="rulesModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRules()">&times;</span>
            <h2>📜 Règles & Actualités</h2>
            <p>• <b>Héros Uniques :</b> Chaque personnage possède ses propres compétences.</p>
            <p>• <b>Difficulté :</b> Ajuste le nombre de compétences (2, 4, 6, 7).</p>
            <p>• <b>Système de Combat :</b> Gère bien tes dégâts et tes soins !</p>
            <p>🔥 <b>À venir :</b> Mode Boss Battle (15 niveaux) !</p>
        </div>
    </div>

    <script>
        function openRules() {
            document.getElementById('rulesModal').style.display = 'flex';
        }
        function closeRules() {
            document.getElementById('rulesModal').style.display = 'none';
        }
    </script>

</body>
</html>
