<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Game - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 style="color: #9146ff; text-transform: uppercase;">HOL Battle Game</h1>
        <button class="btn-main" onclick="window.location.href='difficulte.html'">🎮 Jouer</button>
        <button class="btn-main" style="background: #3a3a3c;" onclick="document.getElementById('rules-modal').style.display='block'">📜 Règles & Actus</button>
    </div>

    <!-- Modale avec croix de fermeture -->
    <div id="rules-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('rules-modal').style.display='none'">&times;</span>
            <h2>📜 Règles & Actualités</h2>
            <p><strong>Comment jouer :</strong> Choisis ta difficulté, ton héros, et affronte l'ennemi.</p>
            <ul>
                <li><strong>Système de Cooldown :</strong> Tes compétences ont un temps de recharge. Ne spammez pas !</li>
                <li>Facile : 2 comp | Normal : 4 | Difficile : 6 | Expert : 7.</li>
            </ul>
        </div>
    </div>

</body>
</html>
