<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HOL Battle Arena - Final</title>
    <style>
        body { background: #121212; color: white; display: flex; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        .character-card { display: block; width: 100%; margin-bottom: 10px; padding: 15px; background: #1a1a1a; border: 1px solid #9146ff; color: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .character-card:hover { background: #333; }
        .difficulty-btn { padding: 12px 24px; margin: 5px; cursor: pointer; background: #9146ff; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; }
        .skill { padding: 15px; background: #222; border: 1px solid #9146ff; color: white; margin: 5px; width: 45%; cursor: pointer; font-size: 14px; }
        .skill:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; }
        #log { margin: 20px 0; padding: 15px; background: #000; border: 1px solid #9146ff; font-weight: bold; height: 50px; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #1a1a1a; padding: 40px; border: 2px solid #9146ff; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="container" id="menu">
        <h1>Choisis ton héros</h1>
        <div id="roster"></div>
        <h3>Difficulté</h3>
        <button class="difficulty-btn" onclick="startFlow('Facile', 2)">Facile (2)</button>
        <button class="difficulty-btn" onclick="startFlow('Normal', 4)">Normal (4)</button>
        <button class="difficulty-btn" onclick="startFlow('Difficile', 6)">Difficile (6)</button>
        <button class="difficulty-btn" onclick="startFlow('Expert', 7)">Expert (7)</button>
    </div>

    <div class="container" id="battle" style="display: none;">
        <h2 id="fight-info"></h2>
        <div id="log">Prêt au combat ?</div>
        <div id="actions"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Victoire !</h2>
            <button class="difficulty-btn" onclick="location.reload()">Rejouer</button>
            <button class="difficulty-btn" onclick="location.reload()">Accueil</button>
        </div>
    </div>

    <script>
        const charData = {
            "House of Laura": { hp: 260, skills: [{n:'Hype',d:40,h:0},{n:'Pause',d:0,h:20},{n:'Raid',d:60,h:0},{n:'Soutien',d:0,h:40},{n:'Ban',d:80,h:0},{n:'Combo',d:50,h:0},{n:'Ulti',d:100,h:0}] },
            "HOL Rozuya": { hp: 230, skills: [{n:'Code',d:20,h:0},{n:'Debug',d:0,h:40},{n:'Compile',d:30,h:0},{n:'Backup',d:0,h:70},{n:'Panic',d:50,h:0},{n:'Soin',d:0,h:50},{n:'HealAll',d:0,h:90}] },
            "HOL Tony": { hp: 320, skills: [{n:'Poing',d:30,h:0},{n:'Boisson',d:0,h:30},{n:'Tacle',d:50,h:0},{n:'Souffle',d:0,h:50},{n:'Colosse',d:70,h:0},{n:'Coup',d:40,h:0},{n:'Mur',d:0,h:60}] },
            "HOL Omass": { hp: 230, skills: [{n:'Tir',d:50,h:0},{n:'Pansement',d:0,h:10},{n:'Perçant',d:70,h:0},{n:'Trousse',d:0,h:20},{n:'Aérien',d:100,h:0},{n:'Rafale',d:60,h:0},{n:'Cible',d:90,h:0}] },
            "K974YT": { hp: 200, skills: [{n:'Clic',d:60,h:5},{n:'Focus',d:0,h:5},{n:'Critique',d:80,h:0},{n:'Manette',d:0,h:5},{n:'Explosion',d:120,h:0},{n:'Combo',d:70,h:0},{n:'Rush',d:90,h:0}] },
            "Dark MortelCygne": { hp: 220, skills: [{n:'Plume',d:40,h:0},{n:'Saignée',d:60,h:10},{n:'Griffes',d:60,h:0},{n:'Festin',d:30,h:30},{n:'Étreinte',d:90,h:20},{n:'Ombre',d:50,h:0},{n:'Noir',d:110,h:0}] }
        };

        let pName, eName, pHP, eHP, pMax, eMax, pS, eS, diffMode, isPlayerTurn = true, selectedHero = null;

        function startFlow(mode, count) {
            if(!selectedHero) return alert("Choisis un héros !");
            diffMode = mode;
            let options = Object.keys(charData).filter(n => n !== selectedHero);
            eName = options[Math.floor(Math.random() * options.length)];
            pMax = pHP = charData[selectedHero].hp;
            eMax = eHP = charData[eName].hp;
            pS = charData[selectedHero].skills.slice(0, count);
            eS = charData[eName].skills.slice(0, count);
            document.getElementById('menu').style.display = 'none';
            document.getElementById('battle').style.display = 'block';
            updateUI();
        }

        function play(i) {
            if (!isPlayerTurn) return;
            isPlayerTurn = false;
            updateUI(); // Désactive les boutons
            eHP -= pS[i].d; pHP = Math.min(pMax, pHP + pS[i].h);
            document.getElementById('log').innerText = `${selectedHero} utilise ${pS[i].n}.`;
            if(eHP <= 0) setTimeout(() => showEnd("Victoire !"), 1000);
            else setTimeout(() => { enemyTurn(); if(pHP <= 0) showEnd("Défaite..."); else { isPlayerTurn = true; updateUI(); } }, 1200);
        }

        function enemyTurn() {
            let s = eS.sort((a,b) => b.d - a.d)[0];
            pHP -= s.d; eHP = Math.min(eMax, eHP + s.h);
            document.getElementById('log').innerText = `${eName} utilise ${s.n}.`;
            updateUI();
        }

        function showEnd(msg) {
            document.getElementById('modal-title').innerText = msg;
            document.getElementById('modal').style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('fight-info').innerText = `${selectedHero} (${pHP} PV) vs ${eName} (${eHP} PV)`;
            let act = document.getElementById('actions'); act.innerHTML = '';
            pS.forEach((s, i) => {
                let b = document.createElement('button');
                b.className = 'skill'; b.disabled = !isPlayerTurn;
                b.innerHTML = `${s.n}<br>${s.d > 0 ? s.d+' Dmg' : s.h+' Soin'}`;
                b.onclick = () => play(i);
                act.appendChild(b);
            });
        }

        Object.keys(charData).forEach(name => {
            let b = document.createElement('button');
            b.className = 'character-card'; b.innerText = name;
            b.onclick = () => { selectedHero = name; document.getElementById('log').innerText = name + " sélectionné !"; };
            document.getElementById('roster').appendChild(b);
        });
    </script>
</body>
</html>
