<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat HOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" style="max-width: 600px;">
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div style="flex: 1; text-align: center;">
                <div id="p-name" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div class="health-bar"><div id="p-bar" class="bar"></div></div>
                <div id="p-hp" style="margin-top: 8px; font-size: 0.95rem; color: #ddd;"></div>
            </div>
            <div style="flex: 1; text-align: center;">
                <div id="e-name" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div class="health-bar"><div id="e-bar" class="bar" style="background: #ff4646;"></div></div>
                <div id="e-hp" style="margin-top: 8px; font-size: 0.95rem; color: #ddd;"></div>
            </div>
        </div>

        <h2 id="log" style="font-size: 1.1rem; margin: 25px 0; text-align: center; color: #9146ff;">À toi de jouer !</h2>
        <div id="actions" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;"></div>
    </div>

    <script>
        const chars = {
            "House of Laura": {hp: 200, skills:[{n:'Hype',v:20,t:'dmg',cd:0},{n:'Pause Café',v:25,t:'heal',cd:2},{n:'Raid',v:40,t:'dmg',cd:2},{n:'Soutien',v:50,t:'heal',cd:3},{n:'Combo',v:60,t:'dmg',cd:2},{n:'Mega',v:80,t:'dmg',cd:4}]},
            "HOL Rozuya": {hp: 150, skills:[{n:'Code',v:15,t:'dmg',cd:0},{n:'Soin',v:30,t:'heal',cd:2},{n:'Debug',v:25,t:'dmg',cd:1},{n:'Backup',v:40,t:'heal',cd:3},{n:'Panic',v:50,t:'dmg',cd:2},{n:'Flash',v:60,t:'dmg',cd:3}]},
            "HOL Tony": {hp: 300, skills:[{n:'Bloc',v:10,t:'dmg',cd:0},{n:'Cri',v:15,t:'dmg',cd:1},{n:'Auto-Soin',v:30,t:'heal',cd:3},{n:'Rush',v:35,t:'dmg',cd:2},{n:'Charge',v:45,t:'dmg',cd:2},{n:'Impact',v:55,t:'dmg',cd:3}]},
            "HOL Omass": {hp: 220, skills:[{n:'Rush',v:20,t:'dmg',cd:0},{n:'Kick',v:30,t:'dmg',cd:1},{n:'Punch',v:40,t:'dmg',cd:2},{n:'Slam',v:45,t:'dmg',cd:2},{n:'Combo',v:60,t:'dmg',cd:3},{n:'Fury',v:75,t:'dmg',cd:4}]},
            "K974YT": {hp: 140, skills:[{n:'Jump',v:25,t:'dmg',cd:0},{n:'Dash',v:35,t:'dmg',cd:1},{n:'Silent',v:45,t:'dmg',cd:2},{n:'Cut',v:55,t:'dmg',cd:2},{n:'Slash',v:70,t:'dmg',cd:3},{n:'Backstab',v:90,t:'dmg',cd:4}]},
            "Dark MortelCygne": {hp: 180, skills:[{n:'Ombre',v:20,t:'dmg',cd:0},{n:'Vampire',v:25,t:'heal',cd:2},{n:'Griffe',v:40,t:'dmg',cd:1},{n:'Night',v:50,t:'dmg',cd:2},{n:'Black',v:65,t:'dmg',cd:3},{n:'Soul',v:85,t:'dmg',cd:4}]}
        };

        let pName = localStorage.getItem('char') || "House of Laura";
        let diff = parseInt(localStorage.getItem('diff')) || 4;
        const eName = Object.keys(chars).filter(n => n !== pName)[0];

        let pS = chars[pName].skills.slice(0, diff).map(s => ({...s, cdActuel: 0}));
        let eS = chars[eName].skills.slice(0, diff).map(s => ({...s, cdActuel: 0}));

        let pHP = chars[pName].hp, eHP = chars[eName].hp;
        let isPlayerTurn = true;

        function updateUI() {
            document.getElementById('p-name').innerText = pName;
            document.getElementById('e-name').innerText = eName;
            document.getElementById('p-hp').innerText = `${Math.max(0, pHP)}/${chars[pName].hp}`;
            document.getElementById('e-hp').innerText = `${Math.max(0, eHP)}/${chars[eName].hp}`;
            document.getElementById('p-bar').style.width = (Math.max(0, pHP) / chars[pName].hp * 100) + "%";
            document.getElementById('e-bar').style.width = (Math.max(0, eHP) / chars[eName].hp * 100) + "%";
            renderButtons();
        }

        function renderButtons() {
            const container = document.getElementById('actions');
            container.innerHTML = '';
            pS.forEach((s, i) => {
                let b = document.createElement('button');
                b.className = 'btn';
                b.style.display = "flex"; b.style.flexDirection = "column"; b.style.alignItems = "center";
                
                // Si en recharge, on affiche le temps restant
                if(s.cdActuel > 0) {
                    b.style.opacity = "0.5";
                    b.innerHTML = `<strong>${s.n}</strong><small>Recharge: ${s.cdActuel}</small>`;
                    b.disabled = true;
                } else {
                    // Si dispo, on affiche le CD total pour info
                    b.innerHTML = `<strong>${s.n}</strong><small>CD: ${s.cd} | ${s.t === 'heal' ? '+' : ''}${s.v} ${s.t}</small>`;
                    b.onclick = () => play(i);
                }
                container.appendChild(b);
            });
        }

        function play(i) {
            if(!isPlayerTurn || pS[i].cdActuel > 0) return;
            
            if(pS[i].t === 'dmg') eHP -= pS[i].v;
            else pHP = Math.min(chars[pName].hp, pHP + pS[i].v);
            
            pS[i].cdActuel = pS[i].cd + 1; // Le +1 sert à ce que le tour actuel compte
            
            document.getElementById('log').innerText = `Tu as utilisé ${pS[i].n} !`;
            updateUI();
            
            if(eHP <= 0) alert("Victoire !");
            else { isPlayerTurn = false; setTimeout(aiTurn, 1000); }
        }

        function aiTurn() {
            pS.forEach(s => { if(s.cdActuel > 0) s.cdActuel--; });
            
            let dispo = eS.filter(s => s.cdActuel === 0);
            if(dispo.length > 0) {
                let s = dispo[Math.floor(Math.random() * dispo.length)];
                if(s.t === 'dmg') pHP -= s.v;
                else eHP = Math.min(chars[eName].hp, eHP + s.v);
                s.cdActuel = s.cd + 1;
                document.getElementById('log').innerText = `${eName} utilise ${s.n} !`;
            } else {
                document.getElementById('log').innerText = `${eName} attend...`;
            }

            eS.forEach(sk => { if(sk.cdActuel > 0) sk.cdActuel--; });
            isPlayerTurn = true;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
