<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arène HOL</title>
    <style>
        body { background: #0e0e10; color: white; font-family: sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 90%; max-width: 500px; background: #1f1f23; padding: 20px; border-radius: 12px; }
        /* Style modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #18181c; margin: 10% auto; padding: 20px; border: 2px solid #9146ff; border-radius: 12px; width: 85%; max-width: 400px; color: white; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
        
        .roster { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .character-card { background: #3a3a3c; padding: 15px; border-radius: 6px; cursor: pointer; text-align: center; }
        .arena { display: flex; justify-content: space-between; margin-bottom: 20px; text-align: center; }
        .health-bar-bg { width: 100%; background: #000; height: 15px; border-radius: 5px; }
        .health-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.skill { padding: 10px; cursor: pointer; background: #3a3a3c; color: white; border: none; border-radius: 6px; }
        button.skill:disabled { background: #222; opacity: 0.5; cursor: not-allowed; }
        #log { height: 120px; background: #000; padding: 10px; margin-bottom: 10px; border-radius: 6px; overflow-y: auto; font-size: 0.9rem; }
    </style>
</head>
<body>

    <!-- Choix Personnage -->
    <div class="container" id="selection-screen">
        <h1>Choisis ton héros</h1>
        <div class="roster" id="roster"></div>
    </div>

    <!-- Combat -->
    <div class="container" id="battle-screen" style="display: none;">
        <button style="background:transparent; border:1px solid #9146ff; color:#9146ff; padding:5px 10px; border-radius:4px; margin-bottom:10px; cursor:pointer;" onclick="document.getElementById('info-modal').style.display='block'">📜 Voir Infos Compétences</button>
        
        <div class="arena">
            <div><h3 id="p-name">Joueur</h3><div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div><p id="p-hp">150/150</p></div>
            <div><h3 id="e-name">Ennemi</h3><div class="health-bar-bg"><div id="e-bar" class="health-fill"></div></div><p id="e-hp">150/150</p></div>
        </div>
        <div id="log"></div>
        <div class="action-grid" id="actions">
            <button class="skill" id="s-basic" onclick="play('basic')">Attaque</button>
            <button class="skill" id="s-heal" onclick="play('heal')">Soin</button>
            <button class="skill" id="s-brise" onclick="play('brise')">Brise Armure</button>
            <button class="skill" id="s-bigHeal" onclick="play('bigHeal')">Gros Soin</button>
            <button class="skill" id="s-stun" onclick="play('stun')">Ban Chat</button>
            <button class="skill" id="s-toxic" onclick="play('toxic')">Toxicité</button>
            <button class="skill" id="s-ulti" onclick="play('ulti')">ULTI</button>
        </div>
    </div>

    <!-- Modale Infos -->
    <div id="info-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('info-modal').style.display='none'">&times;</span>
            <h2>Statistiques Compétences</h2>
            <table style="width:100%; border-collapse: collapse; color: #ddd; font-size: 0.9rem;">
                <tr style="border-bottom:1px solid #444; color:#fff;"><th>Compétence</th><th>Effet</th><th>Recharge</th></tr>
                <tr><td style="padding:5px;">Attaque</td><td>15 Dmg</td><td>0 tour</td></tr>
                <tr><td style="padding:5px;">Soin</td><td>+20 PV</td><td>2 tours</td></tr>
                <tr><td style="padding:5px;">Brise Armure</td><td>25 Dmg</td><td>2 tours</td></tr>
                <tr><td style="padding:5px;">Gros Soin</td><td>+50 PV</td><td>3 tours</td></tr>
                <tr><td style="padding:5px;">Ban Chat</td><td>Neutralise</td><td>4 tours</td></tr>
                <tr><td style="padding:5px;">Toxicité</td><td>Poison</td><td>4 tours</td></tr>
                <tr><td style="padding:5px;">ULTI</td><td>40 Dmg</td><td>6 tours</td></tr>
            </table>
        </div>
    </div>

    <script>
        const diff = localStorage.getItem('diff') || 'normal';
        let pHP=150, eHP=150, active=true;
        const heroes = ["House of Laura", "HOL Tony", "HOL Rozuya", "HOL Omass", "K974YT", "Dark MortelCygne"];
        const skillConfig = {
            'basic': { cdMax: 0, currentCd: 0 },
            'heal': { cdMax: 2, currentCd: 0 },
            'brise': { cdMax: 2, currentCd: 0 },
            'bigHeal': { cdMax: 3, currentCd: 0 },
            'stun': { cdMax: 4, currentCd: 0 },
            'toxic': { cdMax: 4, currentCd: 0 },
            'ulti': { cdMax: 6, currentCd: 0 }
        };

        const r = document.getElementById('roster');
        heroes.forEach(n => {
            let d = document.createElement('div'); d.className='character-card'; d.innerText=n;
            d.onclick = () => start(n); r.appendChild(d);
        });

        function start(name) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            document.getElementById('p-name').innerText = name;
            const others = heroes.filter(h => h !== name);
            document.getElementById('e-name').innerText = others[Math.floor(Math.random() * others.length)];
            
            document.getElementById('s-brise').style.display = (diff === 'facile') ? 'none' : 'block';
            document.getElementById('s-bigHeal').style.display = (diff === 'facile') ? 'none' : 'block';
            document.getElementById('s-stun').style.display = (diff === 'difficile' || diff === 'expert') ? 'block' : 'none';
            document.getElementById('s-toxic').style.display = (diff === 'difficile' || diff === 'expert') ? 'block' : 'none';
            document.getElementById('s-ulti').style.display = (diff === 'expert') ? 'block' : 'none';
        }

        function play(action) {
            if(!active) return;
            if(action === 'heal') pHP = Math.min(150, pHP + 20);
            else if(action === 'bigHeal') pHP = Math.min(150, pHP + 50);
            else eHP = Math.max(0, eHP - (action === 'basic' ? 15 : action === 'ulti' ? 40 : 25));
            
            skillConfig[action].currentCd = skillConfig[action].cdMax;
            active = false;
            updateUI();
            setTimeout(iaTurn, 1000);
        }

        function iaTurn() {
            if(eHP > 0) {
                pHP = Math.max(0, pHP - 15);
                for(let k in skillConfig) if(skillConfig[k].currentCd > 0) skillConfig[k].currentCd--;
                updateUI();
                active = true;
            }
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = pHP + "/150";
            document.getElementById('e-hp').innerText = eHP + "/150";
            document.getElementById('p-bar').style.width = (pHP/150*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/150*100) + "%";
            for(let k in skillConfig) {
                let btn = document.getElementById('s-' + k);
                if(btn) {
                    btn.disabled = (skillConfig[k].currentCd > 0);
                    btn.style.opacity = (skillConfig[k].currentCd > 0) ? "0.5" : "1";
                }
            }
        }
    </script>
</body>
</html>
