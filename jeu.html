<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HOL Battle Game - Arène</title>
    <style>
        body { background: #0e0e10; color: white; font-family: sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 90%; max-width: 500px; background: #1f1f23; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .arena { display: flex; justify-content: space-between; margin-bottom: 20px; text-align: center; }
        .health-bar-bg { width: 100%; background: #000; height: 15px; border-radius: 5px; margin-top: 5px; }
        .health-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button.skill { padding: 10px; cursor: pointer; background: #3a3a3c; color: white; border: none; border-radius: 6px; font-size: 0.85rem; }
        button.skill:hover:not(:disabled) { background: #505055; }
        button.skill:disabled { background: #222; color: #666; cursor: not-allowed; opacity: 0.7; }
        button.skill strong { display: block; font-size: 1rem; color: #fff; }
        button.skill small { color: #aaa; }
        
        #log { height: 120px; background: #000; padding: 10px; font-size: 0.9rem; margin-bottom: 15px; border-radius: 6px; overflow-y: auto; border: 1px solid #333; display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>

    <div class="container" id="battle-screen">
        <div class="arena">
            <div style="width: 45%;"><h3 id="p-name">Joueur</h3><div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div><p id="p-hp">150/150</p></div>
            <div style="width: 45%;"><h3 id="e-name">Ennemi</h3><div class="health-bar-bg"><div id="e-bar" class="health-fill"></div></div><p id="e-hp">150/150</p></div>
        </div>
        
        <div id="log"></div>
        
        <div class="action-grid" id="actions">
            <button class="skill" id="s-basic" onclick="play('basic')"><strong>Attaque</strong><small>15 dmg (0 tour)</small></button>
            <button class="skill" id="s-heal" onclick="play('heal')"><strong>Soin</strong><small>+20 PV (2 tours)</small></button>
            <button class="skill" id="s-brise" onclick="play('brise')"><strong>Brise Armure</strong><small>25 dmg (2 tours)</small></button>
            <button class="skill" id="s-bigHeal" onclick="play('bigHeal')"><strong>Gros Soin</strong><small>+50 PV (3 tours)</small></button>
            <button class="skill" id="s-stun" onclick="play('stun')"><strong>Ban Chat</strong><small>Neutralise (4 tours)</small></button>
            <button class="skill" id="s-toxic" onclick="play('toxic')"><strong>Toxicité</strong><small>Poison (4 tours)</small></button>
            <button class="skill" id="s-ulti" onclick="play('ulti')" style="background:#9146ff"><strong>ULTI</strong><small>40 dmg (6 tours)</small></button>
        </div>
    </div>

    <script>
        // Configuration des compétences et leurs recharges (cooldowns)
        const skillConfig = {
            'basic': { name: 'Attaque', cdMax: 0, currentCd: 0 },
            'heal': { name: 'Soin', cdMax: 2, currentCd: 0 },
            'brise': { name: 'Brise Armure', cdMax: 2, currentCd: 0 },
            'bigHeal': { name: 'Gros Soin', cdMax: 3, currentCd: 0 },
            'stun': { name: 'Ban Chat', cdMax: 4, currentCd: 0 },
            'toxic': { name: 'Toxicité', cdMax: 4, currentCd: 0 },
            'ulti': { name: 'ULTI', cdMax: 6, currentCd: 0 }
        };

        let pHP=150, eHP=150, active=true;

        function play(action) {
            if(!active) return;
            
            // Appliquer l'effet
            if (action === 'heal') pHP = Math.min(150, pHP + 20);
            else if (action === 'bigHeal') pHP = Math.min(150, pHP + 50);
            else {
                let dmg = (action === 'basic') ? 15 : (action === 'ulti') ? 40 : 25;
                eHP = Math.max(0, eHP - dmg);
            }

            // Mettre en cooldown
            skillConfig[action].currentCd = skillConfig[action].cdMax;

            log("Tu as utilisé : " + skillConfig[action].name, "#3498db");
            updateUI();
            
            if(eHP <= 0) endGame("Victoire !");
            else {
                active = false;
                setTimeout(iaTurn, 1000);
            }
        }

        function iaTurn() {
            if(eHP <= 0) return;
            pHP = Math.max(0, pHP - 15);
            
            // Décrémenter tous les cooldowns après le tour de l'IA
            for (let key in skillConfig) {
                if (skillConfig[key].currentCd > 0) skillConfig[key].currentCd--;
            }
            
            log("L'ennemi t'attaque (-15 PV)", "#e74c3c");
            updateUI();
            if(pHP <= 0) endGame("Défaite...");
            else active = true;
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = pHP + "/150";
            document.getElementById('e-hp').innerText = eHP + "/150";
            document.getElementById('p-bar').style.width = (pHP/150*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/150*100) + "%";

            // Mise à jour visuelle des boutons
            for (let key in skillConfig) {
                let btn = document.getElementById('s-' + key);
                if (skillConfig[key].currentCd > 0) {
                    btn.disabled = true;
                    btn.querySelector('small').innerText = "Recharge : " + skillConfig[key].currentCd;
                } else {
                    btn.disabled = false;
                    // Reset texte (facultatif, selon ta préférence)
                }
            }
        }

        function log(msg, color) {
            const entry = document.createElement('div');
            entry.style.color = color;
            entry.innerText = "> " + msg;
            const logDiv = document.getElementById('log');
            logDiv.prepend(entry);
        }

        function endGame(msg) {
            active = false;
            log(msg, "#f1c40f");
            document.getElementById('actions').style.display = 'none';
        }
    </script>
</body>
</html>
