<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura | Arène</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #0e0e10; --bg-panel: #18181b; --twitch-purple: #9146ff; --text-main: #ffffff; --danger: #ef4444; }
        body { background: var(--bg-base); color: var(--text-main); font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        h1, h2 { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Conteneurs */
        .box { background: var(--bg-panel); padding: 30px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); width: 100%; max-width: 600px; text-align: center; }
        .team { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        
        /* Cartes stylisées */
        .card { width: 130px; padding: 15px; background: #27272a; border: 2px solid #333; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #555; }
        .card.selected { border-color: var(--twitch-purple); box-shadow: 0 0 15px rgba(145, 70, 255, 0.4); }
        .card.target { border-color: var(--danger); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        
        /* Boutons */
        .btn { padding: 15px 30px; margin: 10px; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; border-radius: 8px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--twitch-purple); border-color: var(--twitch-purple); }
    </style>
</head>
<body>

    <div id="setup" class="box">
        <h1>Choix de difficulté</h1>
        <button class="btn" onclick="initGame('facile')">Facile</button>
        <button class="btn" onclick="initGame('difficile')">Difficile</button>
    </div>

    <div id="arena" class="box" style="display:none; max-width: 800px;">
        <h2 id="status">Sélectionne ton héros, puis un ennemi !</h2>
        
        <h3 style="color: var(--danger);">Ennemis</h3>
        <div id="enemy-team" class="team"></div>
        
        <h3 style="color: var(--twitch-purple);">Ton équipe</h3>
        <div id="player-team" class="team"></div>
    </div>

    <script>
        let state = { pTeam: [], eTeam: [], selectedHero: null, difficulty: '' };

        function initGame(diff) {
            state.difficulty = diff;
            state.pTeam = [{name:"Laura", hp:100}, {name:"Tony", hp:100}, {name:"Rozuya", hp:100}];
            state.eTeam = [{name:"Hater", hp:80}, {name:"Hater", hp:80}, {name:"Hater", hp:80}];
            document.getElementById('setup').style.display = 'none';
            document.getElementById('arena').style.display = 'block';
            render();
        }

        function render() {
            document.getElementById('player-team').innerHTML = state.pTeam.map((h, i) => 
                `<div class="card ${state.selectedHero === i ? 'selected' : ''}" onclick="selectHero(${i})">
                    <strong>${h.name}</strong><br><small>${h.hp} HP</small>
                </div>`).join('');
            document.getElementById('enemy-team').innerHTML = state.eTeam.map((h, i) => 
                `<div class="card ${state.selectedHero !== null ? 'target' : ''}" onclick="attack(${i})">
                    <strong>${h.name}</strong><br><small>${h.hp} HP</small>
                </div>`).join('');
        }

        function selectHero(i) { 
            state.selectedHero = i; 
            document.getElementById('status').innerText = "Cible un ennemi pour attaquer !"; 
            render(); 
        }

        function attack(i) {
            if (state.selectedHero === null) return;
            state.eTeam[i].hp -= 30;
            state.selectedHero = null;
            document.getElementById('status').innerText = "Attaque lancée !";
            render();
            setTimeout(aiMove, 800);
        }

        function aiMove() {
            let dmg = state.difficulty === 'difficile' ? 25 : 10;
            let target = state.pTeam[Math.floor(Math.random() * state.pTeam.length)];
            target.hp = Math.max(0, target.hp - dmg);
            document.getElementById('status').innerText = "L'ennemi t'attaque !";
            render();
        }
    </script>
</body>
</html>
