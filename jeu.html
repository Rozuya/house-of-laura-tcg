<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura | Arena</title>
    <style>
        :root { --leg: #f59e0b; --epi: #a855f7; --rare: #3b82f6; --com: #22c55e; --bg: #060608; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #game-board { display: flex; flex-direction: column; justify-content: space-between; height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .zone { display: flex; justify-content: center; gap: 20px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        
        .card { width: 140px; height: 190px; background: #121212; border: 4px solid #333; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .card:hover { transform: translateY(-10px); }
        .card.selected { border-color: #9146ff; box-shadow: 0 0 20px #9146ff; }
        .card.target { border-color: #ef4444; box-shadow: 0 0 20px #ef4444; }
        .card.legendary { border-color: var(--leg); }
        .card.epic { border-color: var(--epi); }
        .card.rare { border-color: var(--rare); }
        .card.common { border-color: var(--com); }

        #ui-layer { position: absolute; top: 45%; left: 0; width: 100%; text-align: center; }
        .btn { padding: 12px 25px; background: #18181b; border: 1px solid #444; color: white; cursor: pointer; margin: 5px; border-radius: 6px; font-weight: bold; }
        .btn:hover { background: #9146ff; border-color: #9146ff; }
    </style>
</head>
<body>

    <div id="setup" style="text-align:center; margin-top:20%;">
        <h1>CHOISIR DIFFICULTÉ</h1>
        <button class="btn" onclick="init('facile')">FACILE</button>
        <button class="btn" onclick="init('difficile')">DIFFICILE</button>
    </div>

    <div id="game-board" style="display:none;">
        <div id="opponent-zone" class="zone"></div>
        <div id="ui-layer">
            <h2 id="status">Sélectionne ton héros</h2>
            <div id="actions"></div>
        </div>
        <div id="player-zone" class="zone"></div>
    </div>

    <script>
        const ROSTER = [
            {n: "House of Laura", r: "legendary", s: [{n:"Ban", d:35}, {n:"Soin", d:-30}]},
            {n: "HOL Tony", r: "epic", s: [{n:"Mod", d:25}, {n:"Hype", d:40}]},
            {n: "HOL Rozuya", r: "rare", s: [{n:"Troll", d:20}, {n:"Clip", d:35}]},
            {n: "HOL Omass", r: "rare", s: [{n:"Spam", d:22}, {n:"Don", d:30}]},
            {n: "K974YT", r: "common", s: [{n:"Follow", d:18}, {n:"Lurk", d:25}]},
            {n: "Dark Mortel", r: "common", s: [{n:"Flame", d:20}, {n:"Back", d:28}]}
        ];

        let state = { pTeam: [], eTeam: [], selected: null, skill: null, diff: '' };

        function init(d) {
            state.diff = d;
            let deck = [...ROSTER].sort(() => Math.random() - 0.5);
            state.pTeam = deck.slice(0, 3).map(c => ({...c, hp: 100}));
            state.eTeam = deck.slice(3, 6).map(c => ({...c, hp: 100}));
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-board').style.display = 'flex';
            render();
        }

        function render() {
            document.getElementById('opponent-zone').innerHTML = state.eTeam.map((c, i) => 
                `<div class="card ${c.r} ${state.skill ? 'target' : ''}" onclick="attack(${i})">
                    <strong>${c.n}</strong><div style="font-size:1.2rem; margin-top:10px;">${c.hp} HP</div>
                </div>`).join('');
            document.getElementById('player-zone').innerHTML = state.pTeam.map((c, i) => 
                `<div class="card ${c.r} ${state.selected === i ? 'selected' : ''}" onclick="select(${i})">
                    <strong>${c.n}</strong><div style="font-size:1.2rem; margin-top:10px;">${c.hp} HP</div>
                </div>`).join('');
        }

        function select(i) {
            state.selected = i;
            document.getElementById('status').innerText = "Choisis ton attaque";
            document.getElementById('actions').innerHTML = state.pTeam[i].s.map(sk => 
                `<button class="btn" onclick="setSkill('${sk.n}', ${sk.d})">${sk.n}</button>`).join('');
            render();
        }

        function setSkill(name, dmg) { 
            state.skill = {name, dmg}; 
            document.getElementById('status').innerText = "Cible un ennemi !"; 
            document.getElementById('actions').innerHTML = ""; 
        }

        function attack(i) {
            if(!state.skill) return;
            state.eTeam[i].hp = Math.max(0, state.eTeam[i].hp - state.skill.dmg);
            state.selected = null; state.skill = null;
            document.getElementById('status').innerText = "Attaque lancée !";
            render();
            setTimeout(aiMove, 1000);
        }

        function aiMove() {
            let dmg = state.diff === 'difficile' ? 25 : 10;
            let t = state.pTeam[Math.floor(Math.random() * state.pTeam.length)];
            t.hp = Math.max(0, t.hp - dmg);
            render();
        }
    </script>
</body>
</html>
