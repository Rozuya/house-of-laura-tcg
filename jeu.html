<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura - L'Arène</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .diff-grid { display: block; margin-top: 20px; }
        .btn-diff { display: block; width: 100%; padding: 15px; margin: 12px 0; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; transition: transform 0.1s; }
        .btn-diff:hover { transform: scale(1.02); }
        .diff-facile { background: #2ecc71; }
        .diff-normal { background: #3498db; }
        .diff-difficile { background: #e67e22; }
        .diff-expert { background: #e74c3c; }
        
        .roster { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .character-card { background: #3a3a3c; padding: 15px; border-radius: 6px; cursor: pointer; text-align: center; }
        .character-card:hover { background: #9146ff; }
    </style>
</head>
<body>

    <div class="container" id="difficulty-screen">
        <h1>Choisis la Difficulté</h1>
        <div class="diff-grid">
            <button class="btn-diff diff-facile" onclick="setDifficulty('facile')">🟢 Facile</button>
            <button class="btn-diff diff-normal" onclick="setDifficulty('normal')">🟡 Normal</button>
            <button class="btn-diff diff-difficile" onclick="setDifficulty('difficile')">🟠 Difficile</button>
            <button class="btn-diff diff-expert" onclick="setDifficulty('expert')">🔴 Expert</button>
        </div>
        <button style="background: #333; width:100%; padding:12px; margin-top:10px; border-radius:6px; border:none; color:white; font-weight:bold; cursor:pointer;" onclick="window.location.href='index.html'">Retour au Menu</button>
    </div>

    <div class="container" id="selection-screen" style="display: none;">
        <h1 id="diff-title">Choisis ton Combattant</h1>
        <div class="roster" id="roster"></div>
        <button style="background: #333; margin-top:20px; width: 100%; padding:10px; border:none; border-radius:6px; color:white; cursor:pointer;" onclick="backToDifficulty()">Retour</button>
    </div>

    <div class="container" id="battle-screen" style="display: none;">
        </div>

    <script>
        let currentDifficulty = 'normal';
        const characters = ["House of Laura", "HOL Tony", "HOL Rozuya", "HOL Omass", "K974YT", "Dark MortelCygne"];

        // ÉTAPE 1 : Stocker la difficulté et passer à l'étape 2
        function setDifficulty(diff) {
            currentDifficulty = diff;
            document.getElementById('difficulty-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'block';
            document.getElementById('diff-title').innerText = "Choisis ton combattant (" + diff.toUpperCase() + ")";
            renderRoster();
        }

        // Retour en arrière
        function backToDifficulty() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('difficulty-screen').style.display = 'block';
        }

        // Générer les personnages dynamiquement
        function renderRoster() {
            const rosterDiv = document.getElementById('roster');
            rosterDiv.innerHTML = ''; 
            characters.forEach(char => {
                let div = document.createElement('div');
                div.className = 'character-card';
                div.innerText = char;
                div.onclick = () => launchBattle(char);
                rosterDiv.appendChild(div);
            });
        }

        // Lancement du combat avec la difficulté mémorisée
        function launchBattle(selectedChar) {
            // Ici tu appelles ta fonction de démarrage de combat existante
            // en utilisant la variable 'currentDifficulty' que tu viens de choisir !
            console.log("Combat lancé avec : " + selectedChar + " en difficulté : " + currentDifficulty);
            startGame(selectedChar); // Ta fonction de jeu existante
        }
        
        // ... (Reste de ton code de combat JS ici) ...
    </script>
</body>
</html>
