<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat HOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" style="max-width: 600px;">
        <div style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div style="flex: 1; text-align: center;">
                <div id="p-name" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div class="health-bar"><div id="p-bar" class="bar"></div></div>
                <div id="p-hp" style="margin-top: 8px; font-size: 0.95rem; color: #ddd;"></div>
            </div>
            <div style="flex: 1; text-align: center;">
                <div id="e-name" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div class="health-bar"><div id="e-bar" class="bar" style="background: #ff4646;"></div></div>
                <div id="e-hp" style="margin-top: 8px; font-size: 0.95rem; color: #ddd;"></div>
            </div>
        </div>

        <h2 id="log" style="font-size: 1.1rem; margin: 25px 0; text-align: center; color: #9146ff;">Que le combat commence !</h2>
        <div id="actions" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;"></div>
    </div>

    <div id="endModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 id="resultText">Résultat</h2>
            <button class="btn" onclick="location.href='index.html'">Accueil</button>
            <button class="btn" onclick="location.href='personnage.html'">Rejouer</button>
        </div>
    </div>

    <script>
        const chars = {
            "House of Laura": {hp: 200, skills:[{n:'Pause',d:15},{n:'Soutien',d:25},{n:'Hype',d:35},{n:'Combo',d:45},{n:'Raid',d:55},{n:'Ban',d:70},{n:'Mega',d:85}]},
            "HOL Rozuya": {hp: 150, skills:[{n:'Code',d:10},{n:'Soin',d:20},{n:'Debug',d:30},{n:'Compile',d:35},{n:'Backup',d:45},{n:'Panic',d:55},{n:'Flash',d:65}]},
            "HOL Tony": {hp: 280, skills:[{n:'Bloc',d:10},{n:'Cri',d:15},{n:'Tacle',d:25},{n:'Rush',d:35},{n:'Charge',d:45},{n:'Impact',d:55},{n:'Stun',d:60}]},
            "HOL Omass": {hp: 180, skills:[{n:'Rush',d:20},{n:'Kick',d:30},{n:'Punch',d:40},{n:'Slam',d:50},{n:'Combo',d:60},{n:'Uppercut',d:70},{n:'Fury',d:85}]},
            "K974YT": {hp: 130, skills:[{n:'Jump',d:25},{n:'Dash',d:35},{n:'Silent',d:45},{n:'Cut',d:55},{n:'Slash',d:70},{n:'Blade',d:85},{n:'Backstab',d:100}]},
            "Dark MortelCygne": {hp: 160, skills:[{n:'Ombre',d:20},{n:'Plume',d:30},{n:'Griffe',d:40},{n:'Night',d:50},{n:'Black',d:65},{n:'Étreinte',d:80},{n:'Soul',d:90}]}
        };

        // Configuration
        let pName = localStorage.getItem('char') || "House of Laura";
        let diff = parseInt(localStorage.getItem('diff')) || 4;
        const charNames = Object.keys(chars);
        const eName = charNames.filter(n => n !== pName)[Math.floor(Math.random() * (charNames.length - 1))];

        // RÈGLE SYMÉTRIQUE : On trie les compétences par dégâts pour tout le monde
        let pS = [...chars[pName].skills].sort((a,b) => a.d - b.d).slice(0, diff);
        let eS = [...chars[eName].skills].sort((a,b) => a.d - b.d).slice(0, diff);

        let pHP = chars[pName].hp, eHP = chars[eName].hp;
        let isPlayerTurn = true;

        function getActualDamage(baseDmg) {
            let varDmg = Math.floor(baseDmg * 0.15);
            return baseDmg + (Math.floor(Math.random() * (varDmg * 2 + 1)) - varDmg);
        }

        function updateUI() {
            document.getElementById('p-name').innerText = pName;
            document.getElementById('e-name').innerText = eName;
            document.getElementById('p-hp').innerText = `${Math.max(0, pHP)}/${chars[pName].hp}`;
            document.getElementById('e-hp').innerText = `${Math.max(0, eHP)}/${chars[eName].hp}`;
            document.getElementById('p-bar').style.width = (Math.max(0, pHP) / chars[pName].hp * 100) + "%";
            document.getElementById('e-bar').style.width = (Math.max(0, eHP) / chars[eName].hp * 100) + "%";
        }

        // Génération boutons joueur
        pS.forEach((s, i) => {
            let b = document.createElement('button');
            b.className = 'btn';
            b.style.margin = "0"; b.style.padding = "15px 5px";
            b.innerHTML = `<strong>${s.n}</strong><br><small>~${s.d} Dmg</small>`;
            b.onclick = () => play(i);
            document.getElementById('actions').appendChild(b);
        });

        function play(i) {
            if(!isPlayerTurn) return;
            let dmg = getActualDamage(pS[i].d);
            eHP -= dmg;
            document.getElementById('log').innerText = `Tu as fait -${dmg} PV avec ${pS[i].n} !`;
            updateUI();
            if(eHP <= 0) endGame("Victoire ! 🎉");
            else { isPlayerTurn = false; setTimeout(aiTurn, 1000); }
        }

        function aiTurn() {
            // IA INTELLIGENTE : Elle choisit ses meilleures attaques selon la diff
            let s;
            if (diff === 2) s = eS[Math.floor(Math.random() * 2)];
            else if (diff === 4) s = eS[Math.floor(Math.random() * 4)];
            else if (diff === 6) s = eS[Math.floor(Math.random() * 6)];
            else s = eS[Math.floor(Math.random() * 3) + 4]; // Expert : privilégie le haut du panier
            
            let dmg = getActualDamage(s.d);
            pHP -= dmg;
            document.getElementById('log').innerText = `${eName} riposte : -${dmg} PV (${s.n}) !`;
            updateUI();
            if(pHP <= 0) endGame("Défaite... 💀");
            else isPlayerTurn = true;
        }

        function endGame(msg) {
            document.getElementById('resultText').innerText = msg;
            document.getElementById('endModal').style.display = 'flex';
        }

        updateUI();
    </script>
</body>
</html>
