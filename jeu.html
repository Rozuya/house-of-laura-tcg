<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>House of Laura | Arena</title>
    <style>
        :root { --leg: #f59e0b; --epi: #a855f7; --rare: #3b82f6; --com: #22c55e; }
        body { margin: 0; background: #060608; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .arena { width: 95%; max-width: 900px; text-align: center; }
        .team { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        
        /* Style Carte "Snap" */
        .card { width: 130px; height: 180px; background: #1c1c1f; border-radius: 12px; border: 4px solid #333; cursor: pointer; transition: 0.3s; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card:hover { transform: scale(1.05); }
        .card.selected { border-color: #9146ff; box-shadow: 0 0 20px #9146ff; }
        .card.target { border-color: #ef4444; box-shadow: 0 0 20px #ef4444; }
        .card.legendary { border-color: var(--leg); }
        .card.epic { border-color: var(--epi); }
        .card.rare { border-color: var(--rare); }
        .card.common { border-color: var(--com); }
        
        .hp-badge { position: absolute; bottom: 10px; background: #000; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        .btn { padding: 12px 25px; background: #9146ff; border: none; color: white; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="arena">
        <div id="setup">
            <h1>SÉLECTIONNE LA DIFFICULTÉ</h1>
            <button class="btn" onclick="init('facile')">FACILE</button>
            <button class="btn" onclick="init('difficile')">DIFFICILE</button>
        </div>

        <div id="game" style="display:none;">
            <h2 id="status">Sélectionne un héros</h2>
            <div id="e-team" class="team"></div>
            <div id="p-team" class="team"></div>
            <div id="actions"></div>
        </div>
    </div>

    <script>
        const ROSTER = [
            {n: "House of Laura", r: "legendary", s: [{n:"Ban", d:35}, {n:"Soin", d:-30}]},
            {n: "HOL Tony", r: "epic", s: [{n:"Mod", d:25}, {n:"Hype", d:40}]},
            {n: "HOL Rozuya", r: "rare", s: [{n:"Troll", d:20}, {n:"Clip", d:35}]},
            {n: "HOL Omass", r: "rare", s: [{n:"Spam", d:22}, {n:"Don", d:30}]},
            {n: "K974YT", r: "common", s: [{n:"Follow", d:18}, {n:"Lurk", d:25}]},
            {n: "Dark Mortel", r: "common", s: [{n:"Flame", d:20}, {n:"Back", d:28}]}
        ];

        let state = { pTeam: [], eTeam: [], selected: null, skill: null, diff: '' };

        function init(d) {
            state.diff = d;
            let deck = [...ROSTER].sort(() => Math.random() - 0.5);
            state.pTeam = deck.slice(0, 3).map(c => ({...c, hp: 100}));
            state.eTeam = deck.slice(3, 6).map(c => ({...c, hp: 100}));
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            render();
        }

        function render() {
            document.getElementById('p-team').innerHTML = state.pTeam.map((c, i) => 
                `<div class="card ${c.r} ${state.selected === i ? 'selected' : ''}" onclick="select(${i})">
                    <strong>${c.n}</strong><div class="hp-badge">${c.hp} HP</div>
                </div>`).join('');
            document.getElementById('e-team').innerHTML = state.eTeam.map((c, i) => 
                `<div class="card ${c.r} ${state.skill ? 'target' : ''}" onclick="attack(${i})">
                    <strong>${c.n}</strong><div class="hp-badge">${c.hp} HP</div>
                </div>`).join('');
        }

        function select(i) {
            state.selected = i;
            document.getElementById('actions').innerHTML = state.pTeam[i].s.map(sk => 
                `<button class="btn" onclick="setSkill('${sk.n}', ${sk.d})">${sk.n}</button>`).join('');
            render();
        }

        function setSkill(n, d) { state.skill = {n, d}; document.getElementById('status').innerText = "Cible un ennemi !"; }

        function attack(i) {
            if(!state.skill) return;
            state.eTeam[i].hp = Math.max(0, state.eTeam[i].hp - state.skill.d);
            state.selected = null; state.skill = null;
            document.getElementById('actions').innerHTML = "";
            render();
            setTimeout(aiMove, 800);
        }

        function aiMove() {
            let dmg = state.diff === 'difficile' ? 25 : 10;
            let t = state.pTeam[Math.floor(Math.random() * state.pTeam.length)];
            t.hp = Math.max(0, t.hp - dmg);
            render();
        }
    </script>
</body>
</html>
