<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Game - Combat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="selection-screen">
        <h1>Choisis ton héros</h1>
        <div class="roster" id="roster" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
    </div>

    <div class="container" id="battle-screen" style="display: none;">
        <div class="arena">
            <div>
                <h3 id="p-name">Joueur</h3>
                <div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div>
                <p id="p-hp">0/0</p>
            </div>
            <div>
                <h3 id="e-name">Ennemi</h3>
                <div class="health-bar-bg"><div id="e-bar" class="health-fill"></div></div>
                <p id="e-hp">0/0</p>
            </div>
        </div>
        
        <div id="log" style="text-align: center; min-height: 25px; margin-bottom: 15px; font-weight: bold; color: #9146ff; font-size: 1.1rem;">
            Que le combat commence !
        </div>

        <div class="action-grid" id="actions">
            <button class="skill" id="s-basic" onclick="play('basic')"></button>
            <button class="skill" id="s-heal" onclick="play('heal')"></button>
            <button class="skill" id="s-brise" onclick="play('brise')"></button>
            <button class="skill" id="s-bigHeal" onclick="play('bigHeal')"></button>
            <button class="skill" id="s-stun" onclick="play('stun')"></button>
            <button class="skill" id="s-toxic" onclick="play('toxic')"></button>
            <button class="skill" id="s-ulti" onclick="play('ulti')"></button>
        </div>
    </div>

    <script>
        const diff = localStorage.getItem('diff') || 'normal';
        let pHP, eHP, pMaxHP, eMaxHP, active=true;
        let playerName, enemyName;
        let pSkills = {}, eSkills = {};
        
        const charData = {
            "House of Laura": { hp: 150, role: "Équilibré", skills: {
                'basic': { name: 'Hype du Chat', dmg: 18, heal: 0, cd: 0 },
                'heal': { name: 'Pause Café', dmg: 0, heal: 25, cd: 2 },
                'brise': { name: 'Raid Massif', dmg: 30, heal: 0, cd: 2 },
                'bigHeal': { name: 'Soutien des Subs', dmg: 0, heal: 60, cd: 3 },
                'stun': { name: 'Bannissement', dmg: 12, heal: 0, cd: 3 },
                'toxic': { name: 'Drama', dmg: 20, heal: 0, cd: 3 },
                'ulti': { name: 'Fin de Live !', dmg: 50, heal: 0, cd: 5 }
            }},
            "HOL Rozuya": { hp: 130, role: "Soutien / Soigneur", skills: {
                'basic': { name: 'Ligne de Code', dmg: 16, heal: 0, cd: 0 },
                'heal': { name: 'Corriger Bug', dmg: 0, heal: 35, cd: 1 },
                'brise': { name: 'Compilation', dmg: 25, heal: 0, cd: 2 },
                'bigHeal': { name: 'Backup Serveur', dmg: 0, heal: 75, cd: 3 },
                'stun': { name: 'Écran Bleu', dmg: 18, heal: 0, cd: 2 },
                'toxic': { name: 'Faille Critique', dmg: 28, heal: 0, cd: 3 },
                'ulti': { name: 'Grosse Mise à Jour', dmg: 48, heal: 0, cd: 5 }
            }},
            "HOL Tony": { hp: 180, role: "Tank / Force", skills: {
                'basic': { name: 'Coup de Poing', dmg: 22, heal: 0, cd: 0 },
                'heal': { name: 'Boisson Énergie', dmg: 0, heal: 15, cd: 2 },
                'brise': { name: 'Tacle Glissé', dmg: 40, heal: 0, cd: 2 },
                'bigHeal': { name: 'Second Souffle', dmg: 0, heal: 45, cd: 3 },
                'stun': { name: 'Coup Bas', dmg: 12, heal: 0, cd: 3 },
                'toxic': { name: 'Provocation', dmg: 20, heal: 0, cd: 3 },
                'ulti': { name: 'Combo Furieux', dmg: 60, heal: 0, cd: 6 }
            }},
            "HOL Omass": { hp: 160, role: "Offensif", skills: {
                'basic': { name: 'Tir Précis', dmg: 20, heal: 0, cd: 0 },
                'heal': { name: 'Pansement', dmg: 0, heal: 20, cd: 2 },
                'brise': { name: 'Balle Perçante', dmg: 35, heal: 0, cd: 2 },
                'bigHeal': { name: 'Trousse de Soin', dmg: 0, heal: 55, cd: 3 },
                'stun': { name: 'Grenade Flash', dmg: 18, heal: 0, cd: 3 },
                'toxic': { name: 'Gaz Toxique', dmg: 25, heal: 0, cd: 3 },
                'ulti': { name: 'Frappe Orbitale', dmg: 55, heal: 0, cd: 5 }
            }},
            "K974YT": { hp: 140, role: "Assassin / Burst", skills: {
                'basic': { name: 'Clic Droit', dmg: 18, heal: 0, cd: 0 },
                'heal': { name: 'Soin Manette', dmg: 0, heal: 25, cd: 2 },
                'brise': { name: 'Coup Critique', dmg: 30, heal: 0, cd: 2 },
                'bigHeal': { name: 'Heal de Zone', dmg: 0, heal: 55, cd: 3 },
                'stun': { name: 'Gros Lagg', dmg: 22, heal: 0, cd: 3 },
                'toxic': { name: 'Commu Ranked', dmg: 18, heal: 0, cd: 2 },
                'ulti': { name: 'Gros Tryhard', dmg: 52, heal: 0, cd: 5 }
            }},
            "Dark MortelCygne": { hp: 120, role: "Vampire (Vol de Vie)", skills: {
                'basic': { name: 'Plume Noire', dmg: 14, heal: 0, cd: 0 },
                'heal': { name: 'Vol de Vie', dmg: 0, heal: 40, cd: 2 },
                'brise': { name: 'Frappe Obscure', dmg: 28, heal: 0, cd: 2 },
                'bigHeal': { name: 'Aura Ténébreuse', dmg: 0, heal: 70, cd: 3 },
                'stun': { name: 'Peur Bleue', dmg: 15, heal: 0, cd: 3 },
                'toxic': { name: 'Poison Obscur', dmg: 30, heal: 0, cd: 3 },
                'ulti': { name: 'Éclipse Totale', dmg: 45, heal: 0, cd: 5 }
            }}
        };

        const heroes = Object.keys(charData);
        heroes.forEach(n => {
            let hero = charData[n];
            let d = document.createElement('button');
            d.className = 'character-card';
            d.innerHTML = `<div style="font-weight: bold; font-size: 1rem;">${n}</div><div style="font-size: 0.75rem; color: #b3b3b3;">${hero.role}</div>`;
            d.onclick = () => start(n);
            document.getElementById('roster').appendChild(d);
        });

        function isSkillAllowed(k) {
            if(diff === 'facile') return k === 'basic' || k === 'heal';
            if(diff === 'normal') return ['basic','heal','brise','bigHeal'].includes(k);
            if(diff === 'difficile') return ['basic','heal','brise','bigHeal','stun','toxic'].includes(k);
            return true;
        }

        function start(name) {
            playerName = name;
            let availableEnemies = heroes.filter(h => h !== playerName);
            enemyName = availableEnemies[Math.floor(Math.random() * availableEnemies.length)];

            pMaxHP = pHP = charData[playerName].hp;
            eMaxHP = eHP = charData[enemyName].hp;

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            document.getElementById('p-name').innerText = playerName;
            document.getElementById('e-name').innerText = enemyName;
            
            for(let k in charData[playerName].skills) {
                let s = charData[playerName].skills[k];
                pSkills[k] = {...s, cdCurrent: 0};
                let btn = document.getElementById('s-'+k);
                if(btn) {
                    btn.innerHTML = `<strong>${s.name}</strong><br><small>${s.heal>0 ? '+'+s.heal+' PV' : s.dmg+' Dmg'} (${s.cd} CD)</small>`;
                    if(!isSkillAllowed(k)) btn.style.display = 'none';
                }
            }
            for(let k in charData[enemyName].skills) {
                eSkills[k] = {...charData[enemyName].skills[k], cdCurrent: 0};
            }
            updateUI();
        }

        function play(action) {
            if(!active) return;
            executeMove(action, true);
            if(eHP > 0) { active = false; setTimeout(iaTurn, 1000); }
        }

        function executeMove(action, isPlayer) {
            let s = isPlayer ? pSkills[action] : eSkills[action];
            if(isPlayer) { eHP = Math.max(0, eHP - s.dmg); pHP = Math.min(pMaxHP, pHP + s.heal); s.cdCurrent = s.cd; }
            else { pHP = Math.max(0, pHP - s.dmg); eHP = Math.min(eMaxHP, eHP + s.heal); s.cdCurrent = s.cd; }
            
            document.getElementById('log').innerText = (isPlayer ? playerName : enemyName) + " utilise " + s.name + " !";
            updateUI();
            if(pHP <= 0 || eHP <= 0) {
                document.getElementById('battle-screen').style.display = 'none';
                alert(pHP > 0 ? "Victoire !" : "Défaite...");
                location.reload();
            }
        }

        function iaTurn() {
            let valid = Object.keys(eSkills).filter(k => eSkills[k].cdCurrent === 0 && isSkillAllowed(k));
            let move = valid[Math.floor(Math.random() * valid.length)];
            executeMove(move, false);
            for(let k in pSkills) if(pSkills[k].cdCurrent > 0) pSkills[k].cdCurrent--;
            for(let k in eSkills) if(eSkills[k].cdCurrent > 0) eSkills[k].cdCurrent--;
            active = true;
            updateUI();
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = pHP + "/" + pMaxHP;
            document.getElementById('e-hp').innerText = eHP + "/" + eMaxHP;
            document.getElementById('p-bar').style.width = (pHP/pMaxHP*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/eMaxHP*100) + "%";
            for(let k in pSkills) {
                let btn = document.getElementById('s-'+k);
                if(btn) {
                    btn.disabled = pSkills[k].cdCurrent > 0;
                    if(btn.disabled) btn.querySelector('small').innerText = "Recharge: " + pSkills[k].cdCurrent;
                }
            }
        }
    </script>
</body>
</html>
