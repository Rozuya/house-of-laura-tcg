<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arène 3v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0e0e10; color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #18181b; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 800px; border: 1px solid #333; }
        .team { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .card { width: 140px; padding: 15px; background: #27272a; border: 2px solid #444; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card.selected { border-color: #9146ff; box-shadow: 0 0 10px #9146ff; }
        .card.target { border-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .btn { padding: 15px 30px; margin: 10px; cursor: pointer; background: #27272a; border: 1px solid #555; color: white; font-weight: bold; border-radius: 6px; }
        .btn:hover { background: #9146ff; }
        h1, h2 { text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="box">
        <!-- Écran de difficulté -->
        <div id="setup">
            <h1>Choix de difficulté</h1>
            <button class="btn" onclick="initGame('facile')">Facile</button>
            <button class="btn" onclick="initGame('difficile')">Difficile</button>
        </div>

        <!-- Arène -->
        <div id="arena" style="display:none;">
            <h2 id="status">Sélectionne ton héros, puis un ennemi !</h2>
            <h3 style="color:#ef4444;">Ennemis</h3>
            <div id="enemy-team" class="team"></div>
            <h3 style="color:#9146ff;">Ton équipe</h3>
            <div id="player-team" class="team"></div>
        </div>
    </div>

    <script>
        const HEROES = [
            {name: "House of Laura", rank: "Légendaire ⭐"},
            {name: "HOL Tony", rank: "Épique 🟣"},
            {name: "HOL Rozuya", rank: "Rare 🔵"},
            {name: "HOL Omass", rank: "Rare 🔵"},
            {name: "K974YT", rank: "Commune 🟢"},
            {name: "Dark MortelCygne", rank: "Commune 🟢"}
        ];

        let state = { pTeam: [], eTeam: [], selectedHero: null, difficulty: '' };

        function initGame(diff) {
            state.difficulty = diff;
            let deck = [...HEROES].sort(() => Math.random() - 0.5);
            state.pTeam = deck.slice(0, 3).map(h => ({...h, hp: 100}));
            state.eTeam = deck.slice(3, 6).map(h => ({...h, hp: 100}));
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('arena').style.display = 'block';
            render();
        }

        function render() {
            document.getElementById('player-team').innerHTML = state.pTeam.map((h, i) => 
                `<div class="card ${state.selectedHero === i ? 'selected' : ''}" onclick="selectHero(${i})">
                    <strong>${h.name}</strong><br><small>${h.rank}</small><br>${h.hp} HP
                </div>`).join('');
            
            document.getElementById('enemy-team').innerHTML = state.eTeam.map((h, i) => 
                `<div class="card ${state.selectedHero !== null ? 'target' : ''}" onclick="attack(${i})">
                    <strong>${h.name}</strong><br><small>${h.rank}</small><br>${h.hp} HP
                </div>`).join('');
        }

        function selectHero(i) { state.selectedHero = i; document.getElementById('status').innerText = "Cible un ennemi !"; render(); }

        function attack(i) {
            if (state.selectedHero === null) return;
            state.eTeam[i].hp -= 30;
            state.selectedHero = null;
            document.getElementById('status').innerText = "Attaque lancée !";
            render();
            setTimeout(aiMove, 800);
        }

        function aiMove() {
            let dmg = state.difficulty === 'difficile' ? 25 : 10;
            let target = state.pTeam[Math.floor(Math.random() * state.pTeam.length)];
            target.hp = Math.max(0, target.hp - dmg);
            document.getElementById('status').innerText = "L'ennemi attaque !";
            render();
        }
    </script>
</body>
</html>
