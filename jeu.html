<!DOCTYPE html>
<html lang="fr">

    <title>Arène de Combat</title>

<body>

        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">

            <div class="health-bar"><div id="e-bar" class="bar" style="background:#ff4646"></div></div>
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <span id="p-hp"></span>
            <span id="e-hp"></span>
        </div>

        <h2 id="log" style="font-size: 1.1rem; color: #9146ff; margin: 15px 0;">Que le combat commence !</h2>

        <!-- Grille des compétences (2x2) -->
        <div id="actions" class="roster" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>
