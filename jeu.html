<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOL Battle Arena</title>
    <style>
        body { background: #121212; color: white; display: flex; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; padding: 10px; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        /* Rendre les boutons adaptatifs pour mobile et PC */
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .character-card, .difficulty-btn { padding: 15px; background: #1a1a1a; border: 1px solid #9146ff; color: white; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .difficulty-btn { background: #9146ff; }
        .skill { padding: 20px; background: #222; border: 1px solid #9146ff; color: white; margin: 5px; cursor: pointer; }
        .skill:disabled { opacity: 0.3; cursor: not-allowed; }
        #log { margin: 20px 0; padding: 15px; background: #000; border: 1px solid #9146ff; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #1a1a1a; padding: 30px; border: 2px solid #9146ff; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container" id="menu">
        <h1>Choisis ton héros</h1>
        <div id="roster" class="btn-grid"></div>
        <h2>Choisis la difficulté</h2>
        <div id="diffs" class="btn-grid"></div>
    </div>

    <div class="container" id="battle" style="display: none;">
        <h2 id="fight-info"></h2>
        <div id="log">Le combat commence !</div>
        <div id="actions" class="btn-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Fin du combat</h2>
            <button class="difficulty-btn" onclick="location.reload()">Retour Accueil</button>
        </div>
    </div>

    <script>
        const charData = {
            "House of Laura": { hp: 260, skills: [{n:'Hype',d:40,h:0},{n:'Pause',d:0,h:20},{n:'Raid',d:60,h:0},{n:'Soutien',d:0,h:40},{n:'Ban',d:80,h:0},{n:'Combo',d:50,h:0},{n:'Ulti',d:100,h:0}] },
            "HOL Rozuya": { hp: 230, skills: [{n:'Code',d:20,h:0},{n:'Debug',d:0,h:40},{n:'Compile',d:30,h:0},{n:'Backup',d:0,h:70},{n:'Panic',d:50,h:0},{n:'Soin',d:0,h:50},{n:'HealAll',d:0,h:90}] },
            "HOL Tony": { hp: 320, skills: [{n:'Poing',d:30,h:0},{n:'Boisson',d:0,h:30},{n:'Tacle',d:50,h:0},{n:'Souffle',d:0,h:50},{n:'Colosse',d:70,h:0},{n:'Coup',d:40,h:0},{n:'Mur',d:0,h:60}] },
            "HOL Omass": { hp: 230, skills: [{n:'Tir',d:50,h:0},{n:'Pansement',d:0,h:10},{n:'Perçant',d:70,h:0},{n:'Trousse',d:0,h:20},{n:'Aérien',d:100,h:0},{n:'Rafale',d:60,h:0},{n:'Cible',d:90,h:0}] },
            "K974YT": { hp: 200, skills: [{n:'Clic',d:60,h:5},{n:'Focus',d:0,h:5},{n:'Critique',d:80,h:0},{n:'Manette',d:0,h:5},{n:'Explosion',d:120,h:0},{n:'Combo',d:70,h:0},{n:'Rush',d:90,h:0}] },
            "Dark MortelCygne": { hp: 220, skills: [{n:'Plume',d:40,h:0},{n:'Saignée',d:60,h:10},{n:'Griffes',d:60,h:0},{n:'Festin',d:30,h:30},{n:'Étreinte',d:90,h:20},{n:'Ombre',d:50,h:0},{n:'Noir',d:110,h:0}] }
        };

        let selectedHero = null, diffs = { 'Facile': 2, 'Normal': 4, 'Difficile': 6, 'Expert': 7 };
        
        // Initialisation du menu
        Object.keys(charData).forEach(name => {
            let b = document.createElement('button');
            b.className = 'character-card'; b.innerText = name;
            b.onclick = () => { selectedHero = name; alert(name + " sélectionné !"); };
            document.getElementById('roster').appendChild(b);
        });

        Object.keys(diffs).forEach(d => {
            let b = document.createElement('button');
            b.className = 'difficulty-btn'; b.innerText = d + " (" + diffs[d] + ")";
            b.onclick = () => { if(selectedHero) start(d, diffs[d]); else alert("Choisis un héros !"); };
            document.getElementById('diffs').appendChild(b);
        });

        function start(mode, count) {
            // ... (logique de jeu inchangée pour assurer la fluidité) ...
            document.getElementById('menu').style.display = 'none';
            document.getElementById('battle').style.display = 'block';
            // suite du code...
        }
    </script>
</body>
</html>
