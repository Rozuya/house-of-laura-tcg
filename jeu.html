<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arène HOL - Combat</title>
    <style>
        body { background: #0e0e10; color: white; font-family: sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 90%; max-width: 500px; background: #1f1f23; padding: 20px; border-radius: 12px; }
        
        /* Sélection Perso */
        .roster { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .character-card { background: #3a3a3c; padding: 15px; border-radius: 6px; cursor: pointer; text-align: center; }
        .character-card:hover { background: #9146ff; }
        
        /* Combat */
        .arena { display: flex; justify-content: space-between; margin-bottom: 20px; text-align: center; }
        .health-bar-bg { width: 100%; background: #000; height: 15px; border-radius: 5px; }
        .health-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button.skill { padding: 10px; cursor: pointer; background: #3a3a3c; color: white; border: none; border-radius: 6px; display: flex; flex-direction: column; align-items: center; }
        button.skill strong { font-size: 1rem; }
        button.skill small { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
        button.skill:disabled { background: #222; opacity: 0.5; cursor: not-allowed; color: #666; }
        
        #log { height: 80px; background: #000; padding: 10px; margin-bottom: 15px; border-radius: 6px; overflow-y: auto; font-size: 0.85rem; border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- Écran Choix Personnage -->
    <div class="container" id="selection-screen">
        <h1>Choisis ton héros</h1>
        <div class="roster" id="roster"></div>
    </div>

    <!-- Écran Combat -->
    <div class="container" id="battle-screen" style="display: none;">
        <div class="arena">
            <div><h3 id="p-name">Joueur</h3><div class="health-bar-bg"><div id="p-bar" class="health-fill"></div></div><p id="p-hp">150/150</p></div>
            <div><h3 id="e-name">Ennemi</h3><div class="health-bar-bg"><div id="e-bar" class="health-fill"></div></div><p id="e-hp">150/150</p></div>
        </div>
        <div id="log"></div>
        <div class="action-grid" id="actions">
            <button class="skill" id="s-basic" onclick="play('basic')"><strong>Attaque</strong><small>15 Dmg (0 CD)</small></button>
            <button class="skill" id="s-heal" onclick="play('heal')"><strong>Soin</strong><small>+20 PV (2 CD)</small></button>
            <button class="skill" id="s-brise" onclick="play('brise')"><strong>Brise Armure</strong><small>25 Dmg (2 CD)</small></button>
            <button class="skill" id="s-bigHeal" onclick="play('bigHeal')"><strong>Gros Soin</strong><small>+50 PV (3 CD)</small></button>
            <button class="skill" id="s-stun" onclick="play('stun')"><strong>Ban Chat</strong><small>Neutralise (4 CD)</small></button>
            <button class="skill" id="s-toxic" onclick="play('toxic')"><strong>Toxicité</strong><small>Poison (4 CD)</small></button>
            <button class="skill" id="s-ulti" onclick="play('ulti')"><strong>ULTI</strong><small>40 Dmg (6 CD)</small></button>
        </div>
    </div>

    <script>
        // Récupération de la difficulté via localStorage
        const diff = localStorage.getItem('diff') || 'normal'; 
        let pHP=150, eHP=150, active=true;
        const heroes = ["House of Laura", "HOL Tony", "HOL Rozuya", "HOL Omass", "K974YT", "Dark MortelCygne"];
        
        const skillConfig = {
            'basic': { desc: '15 Dmg (0 CD)', cdMax: 0, currentCd: 0 },
            'heal': { desc: '+20 PV (2 CD)', cdMax: 2, currentCd: 0 },
            'brise': { desc: '25 Dmg (2 CD)', cdMax: 2, currentCd: 0 },
            'bigHeal': { desc: '+50 PV (3 CD)', cdMax: 3, currentCd: 0 },
            'stun': { desc: 'Neutralise (4 CD)', cdMax: 4, currentCd: 0 },
            'toxic': { desc: 'Poison (4 CD)', cdMax: 4, currentCd: 0 },
            'ulti': { desc: '40 Dmg (6 CD)', cdMax: 6, currentCd: 0 }
        };

        // Remplir le roster
        const r = document.getElementById('roster');
        heroes.forEach(n => {
            let d = document.createElement('div'); d.className='character-card'; d.innerText=n;
            d.onclick = () => start(n); r.appendChild(d);
        });

        function start(name) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            document.getElementById('p-name').innerText = name;
            
            const others = heroes.filter(h => h !== name);
            document.getElementById('e-name').innerText = others[Math.floor(Math.random() * others.length)];
            
            // Masquage automatique selon difficulté
            const skills = ['brise', 'bigHeal', 'stun', 'toxic', 'ulti'];
            skills.forEach(s => { document.getElementById('s-' + s).style.display = 'none'; });

            if(diff !== 'facile') {
                document.getElementById('s-brise').style.display = 'flex';
                document.getElementById('s-bigHeal').style.display = 'flex';
            }
            if(diff === 'difficile' || diff === 'expert') {
                document.getElementById('s-stun').style.display = 'flex';
                document.getElementById('s-toxic').style.display = 'flex';
            }
            if(diff === 'expert') {
                document.getElementById('s-ulti').style.display = 'flex';
            }
        }

        function play(action) {
            if(!active) return;
            if(action === 'heal') pHP = Math.min(150, pHP + 20);
            else if(action === 'bigHeal') pHP = Math.min(150, pHP + 50);
            else eHP = Math.max(0, eHP - (action === 'basic' ? 15 : action === 'ulti' ? 40 : 25));
            
            skillConfig[action].currentCd = skillConfig[action].cdMax;
            active = false;
            updateUI();
            if(eHP > 0) setTimeout(iaTurn, 1000);
            else alert("Victoire !");
        }

        function iaTurn() {
            if(eHP > 0) {
                pHP = Math.max(0, pHP - 15);
                for(let k in skillConfig) if(skillConfig[k].currentCd > 0) skillConfig[k].currentCd--;
                updateUI();
                active = true;
            }
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = pHP + "/150";
            document.getElementById('e-hp').innerText = eHP + "/150";
            document.getElementById('p-bar').style.width = (pHP/150*100) + "%";
            document.getElementById('e-bar').style.width = (eHP/150*100) + "%";
            
            for(let k in skillConfig) {
                let btn = document.getElementById('s-' + k);
                if(btn) {
                    let small = btn.querySelector('small');
                    if (skillConfig[k].currentCd > 0) {
                        btn.disabled = true;
                        small.innerText = "Recharge: " + skillConfig[k].currentCd;
                    } else {
                        btn.disabled = false;
                        small.innerText = skillConfig[k].desc;
                    }
                }
            }
        }
    </script>
</body>
</html>
