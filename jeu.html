<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Laura - L'Arène</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles rapides pour l'écran de difficulté intégré */
        .diff-grid {
            display: block;
            margin-top: 20px;
        }
        .btn-diff {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }
        .btn-diff:hover { transform: scale(1.02); }
        .diff-facile { background: #2ecc71; }
        .diff-normal { background: #3498db; }
        .diff-difficile { background: #e67e22; }
        .diff-expert { background: #e74c3c; }
    </style>
</head>
<body>

    <div class="container" id="difficulty-screen">
        <h1>Choisis la Difficulté</h1>
        <div class="diff-grid">
            <button class="btn-diff diff-facile" onclick="selectDifficulty('facile')">🟢 Facile (Interface simplifiée - 2 compétences)</button>
            <button class="btn-diff diff-normal" onclick="selectDifficulty('normal')">🟡 Normal (Stratégie intermédiaire - 4 compétences)</button>
            <button class="btn-diff diff-difficile" onclick="selectDifficulty('difficile')">🟠 Difficile (Combat complet - 6 compétences)</button>
            <button class="btn-diff diff-expert" onclick="selectDifficulty('expert')">🔴 Expert (IA redoutable - 6 compétences)</button>
        </div>
        <br>
        <button style="background: #333; width:100%; padding:12px; border-radius:6px; border:none; color:white; font-weight:bold; cursor:pointer;" onclick="window.location.href='index.html'">Retour au Menu</button>
    </div>

    <div class="container" id="selection-screen" style="display: none;">
        <h1>Choisis ton Combattant</h1>
        <div class="roster" id="roster"></div>
        <br>
        <button style="background: #333;" onclick="backToDifficulty()">Retour</button>
    </div>

    <div class="container" id="battle-screen" style="display: none;">
        <h2 id="battle-title">Combat</h2>
        
        <div class="arena">
            <div class="fighter" id="player-box">
                <h3 id="player-name">Joueur</h3>
                <div class="health-bar-bg">
                    <div class="health-fill" id="player-hp-bar"></div>
                    <div class="hp-text"><span id="player-hp-text">100</span> / <span id="player-maxhp-text">100</span></div>
                </div>
                <div class="status-effects" id="player-status"></div>
            </div>
            
            <div class="fighter" id="enemy-box">
                <h3 id="enemy-name">IA</h3>
                <div class="health-bar-bg">
                    <div class="health-fill" id="enemy-hp-bar"></div>
                    <div class="hp-text"><span id="enemy-hp-text">100</span> / <span id="enemy-maxhp-text">100</span></div>
                </div>
                <div class="status-effects" id="enemy-status"></div>
            </div>
        </div>

        <div id="combat-log">En attente du début du match...</div>

        <div class="action-grid" id="action-buttons">
            <button onclick="executeAction('basic')" id="btn-basic">
                ⚔️ Attaque Basique <span class="cooldown-text">Dégâts modérés</span>
            </button>
            <button onclick="executeAction('smallHeal')" id="btn-smallHeal">
                💊 Snack Rapide <span class="cooldown-text">Petit soin constant</span>
            </button>
            
            <button onclick="executeAction('briseDef')" id="btn-briseDef">
                🛡️ Brise-Armure <span class="cooldown-text" id="cd-briseDef">Réduit la Def (2T)</span>
            </button>
            <button onclick="executeAction('bigHeal')" id="btn-bigHeal">
                離開 Trousse Secours <span class="cooldown-text" id="cd-bigHeal">Gros soin</span>
            </button>

            <button onclick="executeAction('stun')" id="btn-stun">
                🔨 Ban Chat <span class="cooldown-text" id="cd-stun">Étourdit l'ennemi (1T)</span>
            </button>
            <button onclick="executeAction('antiHeal')" id="btn-antiHeal">
                ☠️ Toxicité <span class="cooldown-text" id="cd-antiHeal">Bloque le soin adverse (2T)</span>
            </button>
        </div>

        <button id="restart-btn" style="display:none; background: var(--twitch-purple); margin-top:20px; width: 100%;" onclick="window.location.href='jeu.html'">Rejouer</button>
        <button id="menu-btn" style="display:none; background: #333; margin-top:10px; width: 100%;" onclick="window.location.href='index.html'">Menu Principal</button>
    </div>

    <script>
        const characters = ["House of Laura", "HOL Tony", "HOL Rozuya", "HOL Omass", "K974YT", "Dark MortelCygne"];
        let difficulty = 'normal'; // Sera écrasé par le choix du joueur
        let isPlayerTurn = true;
        let gameActive = true;

        class Fighter {
            constructor(name, maxHp, isPlayer) {
                this.name = name;
                this.maxHp = maxHp;
                this.hp = maxHp;
                this.isPlayer = isPlayer;
                
                this.defDebuffTurns = 0;
                this.stunTurns = 0;
                this.antiHealTurns = 0;
                this.cooldowns = { briseDef: 0, stun: 0, antiHeal: 0, bigHeal: 0 };
            }
        }

        let player, enemy;

        // Génération initiale du roster
        const rosterDiv = document.getElementById('roster');
        characters.forEach(char => {
            let div = document.createElement('div');
            div.className = 'character-card';
            div.innerText = char;
            div.onclick = () => startGame(char);
            rosterDiv.appendChild(div);
        });

        // Étape 1 -> Étape 2
        function selectDifficulty(chosenDiff) {
            difficulty = chosenDiff;
            localStorage.setItem('hol_difficulte', chosenDiff); // Optionnel, garde en mémoire au cas où
            document.getElementById('difficulty-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'block';
        }

        // Retour Étape 2 -> Étape 1
        function backToDifficulty() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('difficulty-screen').style.display = 'block';
        }

        // Étape 2 -> Étape 3 (Lancement du combat)
        function startGame(selectedChar) {
            let remainingChars = characters.filter(c => c !== selectedChar);
            let enemyName = remainingChars[Math.floor(Math.random() * remainingChars.length)];

            let pMaxHp = 150, eMaxHp = 150;
            if (difficulty === 'facile') { pMaxHp = 200; eMaxHp = 100; }
            if (difficulty === 'difficile') { pMaxHp = 150; eMaxHp = 220; }
            if (difficulty === 'expert') { pMaxHp = 120; eMaxHp = 250; }

            player = new Fighter(selectedChar, pMaxHp, true);
            enemy = new Fighter(enemyName, eMaxHp, false);

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            document.getElementById('player-name').innerText = player.name;
            document.getElementById('enemy-name').innerText = enemy.name + ` (IA ${difficulty.toUpperCase()})`;
            
            document.getElementById('player-maxhp-text').innerText = player.maxHp;
            document.getElementById('enemy-maxhp-text').innerText = enemy.maxHp;

            // ADAPTATION DYNAMIQUE DES BOUTONS SELON LA DIFFICULTÉ CHOISIE
            if (difficulty === 'facile') {
                document.getElementById('btn-briseDef').style.display = 'none';
                document.getElementById('btn-bigHeal').style.display = 'none';
                document.getElementById('btn-stun').style.display = 'none';
                document.getElementById('btn-antiHeal').style.display = 'none';
            } else if (difficulty === 'normal') {
                document.getElementById('btn-briseDef').style.display = 'block';
                document.getElementById('btn-bigHeal').style.display = 'block';
                document.getElementById('btn-stun').style.display = 'none';
                document.getElementById('btn-antiHeal').style.display = 'none';
            } else {
                document.getElementById('btn-briseDef').style.display = 'block';
                document.getElementById('btn-bigHeal').style.display = 'block';
                document.getElementById('btn-stun').style.display = 'block';
                document.getElementById('btn-antiHeal').style.display = 'block';
            }

            updateUI();
            log(`🔥 Le combat commence ! ${player.name} VS ${enemy.name}`);
        }

        function log(msg) {
            const logBox = document.getElementById('combat-log');
            logBox.innerHTML = `<div>> ${msg}</div>` + logBox.innerHTML;
        }

        function updateUI() {
            document.getElementById('player-hp-text').innerText = player.hp;
            document.getElementById('enemy-hp-text').innerText = enemy.hp;
            document.getElementById('player-hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
            document.getElementById('enemy-hp-bar').style.width = (enemy.hp / enemy.maxHp * 100) + "%";
            document.getElementById('player-hp-bar').style.background = (player.hp < player.maxHp * 0.3) ? 'var(--danger)' : 'var(--success)';
            document.getElementById('enemy-hp-bar').style.background = (enemy.hp < enemy.maxHp * 0.3) ? 'var(--danger)' : 'var(--success)';

            renderStatus(player, 'player-status');
            renderStatus(enemy, 'enemy-status');

            if (isPlayerTurn && gameActive) {
                document.getElementById('action-buttons').style.opacity = '1';
                document.getElementById('action-buttons').style.pointerEvents = 'auto';
                
                updateButton('briseDef', 'Réduit la Def (2T)');
                updateButton('stun', 'Étourdit l\'ennemi (1T)');
                updateButton('antiHeal', 'Bloque le soin (2T)');
                updateButton('bigHeal', 'Gros soin');
            } else {
                document.getElementById('action-buttons').style.opacity = '0.5';
                document.getElementById('action-buttons').style.pointerEvents = 'none';
            }
        }

        function renderStatus(fighter, elementId) {
            let container = document.getElementById(elementId);
            container.innerHTML = "";
            if (fighter.stunTurns > 0) container.innerHTML += `<span class="status-badge badge-stun">Stun (${fighter.stunTurns})</span>`;
            if (fighter.defDebuffTurns > 0) container.innerHTML += `<span class="status-badge badge-def">Def -50% (${fighter.defDebuffTurns})</span>`;
            if (fighter.antiHealTurns > 0) container.innerHTML += `<span class="status-badge badge-antiheal">Anti-Soin (${fighter.antiHealTurns})</span>`;
        }

        function updateButton(skill, baseText) {
            let btn = document.getElementById(`btn-${skill}`);
            let textSpan = document.getElementById(`cd-${skill}`);
            if(!btn || btn.style.display === 'none') return;
            
            if (player.cooldowns[skill] > 0) {
                btn.disabled = true;
                textSpan.innerText = `[Recharge : ${player.cooldowns[skill]} tours]`;
            } else {
                btn.disabled = false;
                textSpan.innerText = baseText;
            }
        }

        function processTurnStart(fighter) {
            if (fighter.defDebuffTurns > 0) fighter.defDebuffTurns--;
            if (fighter.antiHealTurns > 0) fighter.antiHealTurns--;
            for (let skill in fighter.cooldowns) {
                if (fighter.cooldowns[skill] > 0) fighter.cooldowns[skill]--;
            }
        }

        function executeAction(skillId, isAi = false) {
            if (!gameActive) return;
            let attacker = isAi ? enemy : player;
            let target = isAi ? player : enemy;

            if (skillId === 'pass') {
                log(`🛑 ${attacker.name} est ÉTOURDI et passe son tour !`);
                attacker.stunTurns--;
                endTurn(isAi);
                return;
            }

            let dmg = 0, heal = 0, skillName = "";
            let dmgMult = (isAi && difficulty === 'expert') ? 1.4 : (isAi && difficulty === 'difficile') ? 1.2 : 1;
            if (target.defDebuffTurns > 0) dmgMult *= 1.5;

            switch(skillId) {
                case 'basic':
                    skillName = "Attaque Basique";
                    dmg = Math.floor((Math.random() * 15 + 15) * dmgMult);
                    break;
                case 'briseDef':
                    skillName = "Brise-Armure";
                    dmg = Math.floor((Math.random() * 10 + 10) * dmgMult);
                    target.defDebuffTurns = 2;
                    attacker.cooldowns.briseDef = 3;
                    log(`🛡️ ${target.name} a son armure brisée ! Il prendra plus de dégâts.`);
                    break;
                case 'stun':
                    skillName = "Ban Chat";
                    dmg = Math.floor((Math.random() * 5 + 5) * dmgMult);
                    target.stunTurns = 1;
                    attacker.cooldowns.stun = 4;
                    log(`🔨 BAM ! ${target.name} prend un Timeout et passera son prochain tour.`);
                    break;
                case 'antiHeal':
                    skillName = "Toxicité";
                    dmg = Math.floor((Math.random() * 10 + 5) * dmgMult);
                    target.antiHealTurns = 2;
                    attacker.cooldowns.antiHeal = 3;
                    log(`☠️ ${target.name} est infecté. Impossible de se soigner pour l'instant !`);
                    break;
                case 'smallHeal':
                    skillName = "Snack Rapide";
                    heal = Math.floor(Math.random() * 15 + 15);
                    break;
                case 'bigHeal':
                    skillName = "Trousse Secours";
                    heal = Math.floor(Math.random() * 30 + 40);
                    attacker.cooldowns.bigHeal = 4;
                    break;
            }

            if (heal > 0) {
                if (attacker.antiHealTurns > 0) {
                    log(`🚫 ${attacker.name} tente le [${skillName}] mais l'Anti-Soin bloque tout !`);
                } else {
                    attacker.hp = Math.min(attacker.maxHp, attacker.hp + heal);
                    log(`💚 ${attacker.name} utilise [${skillName}] et récupère ${heal} PV.`);
                }
            }

            if (dmg > 0) {
                target.hp = Math.max(0, target.hp - dmg);
                log(`⚔️ ${attacker.name} utilise [${skillName}] : -${dmg} PV !`);
            }

            updateUI();
            
            if (target.hp === 0) {
                log(`🏆 TERMINE ! ${attacker.name} a gagné le combat !`);
                gameActive = false;
                document.getElementById('action-buttons').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'block';
                document.getElementById('menu-btn').style.display = 'block';
                return;
            }

            endTurn(isAi);
        }

        function endTurn(wasAiTurn) {
            if (!gameActive) return;
            
            if (wasAiTurn) {
                isPlayerTurn = true;
                processTurnStart(player);
                updateUI();
                if (player.stunTurns > 0) {
                    setTimeout(() => executeAction('pass', false), 1500);
                }
            } else {
                isPlayerTurn = false;
                updateUI();
                processTurnStart(enemy);
                
                log(`🧠 ${enemy.name} réfléchit à sa prochaine action...`);
                setTimeout(() => aiTurn(), 1800);
            }
        }

        function aiTurn() {
            if (!gameActive) return;
            if (enemy.stunTurns > 0) { executeAction('pass', true); return; }

            let hpPercent = enemy.hp / enemy.maxHp;
            let playerHpPercent = player.hp / player.maxHp;
            let chosenSkill = 'basic';

            let canBriseDef = (difficulty !== 'facile' && enemy.cooldowns.briseDef === 0 && player.defDebuffTurns === 0);
            let canBigHeal = (difficulty !== 'facile' && enemy.cooldowns.bigHeal === 0 && enemy.antiHealTurns === 0);
            let canStun = ((difficulty === 'expert' || difficulty === 'difficile') && enemy.cooldowns.stun === 0 && player.stunTurns === 0);
            let canAntiHeal = ((difficulty === 'expert' || difficulty === 'difficile') && enemy.cooldowns.antiHeal === 0 && player.antiHealTurns === 0);
            let wantsSmallHeal = (hpPercent < 0.6 && enemy.antiHealTurns === 0);

            if (difficulty === 'expert' || difficulty === 'difficile') {
                if (hpPercent < 0.40 && canBigHeal) chosenSkill = 'bigHeal';
                else if (hpPercent < 0.50 && wantsSmallHeal && Math.random() > 0.4) chosenSkill = 'smallHeal';
                else if (playerHpPercent < 0.45 && canAntiHeal) chosenSkill = 'antiHeal';
                else if (canStun) chosenSkill = 'stun';
                else if (canBriseDef) chosenSkill = 'briseDef';
                else chosenSkill = 'basic';
            } 
            else if (difficulty === 'normal') {
                if (hpPercent < 0.35 && canBigHeal) chosenSkill = 'bigHeal';
                else if (wantsSmallHeal && Math.random() > 0.5) chosenSkill = 'smallHeal';
                else if (canBriseDef && Math.random() > 0.4) chosenSkill = 'briseDef';
                else chosenSkill = 'basic';
            } 
            else { 
                if (hpPercent < 0.40 && wantsSmallHeal && Math.random() > 0.3) chosenSkill = 'smallHeal';
                else chosenSkill = 'basic';
            }

            executeAction(chosenSkill, true);
        }
    </script>
</body>
</html>
